<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#020611">
  <title>ARISE SYSTEM v28</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#020611;--panel:#071427;--panel2:#0b1b33;--line:rgba(132,210,255,.18);
      --text:#f3fbff;--muted:#91a9bd;--cyan:#7df7ff;--blue:#5ea8ff;--red:#ff4d6d;
      --green:#64ffad;--amber:#ffd26b;--radius:24px;--safe:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;margin:0;overflow:hidden;background:
      radial-gradient(circle at 50% -10%,rgba(72,150,255,.28),transparent 34%),
      radial-gradient(circle at 12% 30%,rgba(255,54,92,.10),transparent 24%),
      linear-gradient(180deg,#01040a,#061225 52%,#020611);color:var(--text);font-family:Inter,system-ui,sans-serif}
    body:before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(180deg,rgba(255,255,255,.035) 0 1px,transparent 1px 7px);opacity:.35;pointer-events:none}
    .app{height:100%;display:flex;justify-content:center}
    .phone{position:relative;width:min(100vw,470px);height:100%;overflow:hidden;border-inline:1px solid rgba(255,255,255,.05);background:rgba(1,7,16,.44)}
    .screen{position:absolute;inset:0;overflow:auto;padding:18px 16px calc(118px + var(--safe));-webkit-overflow-scrolling:touch}
    .screen::-webkit-scrollbar{width:0}
    .center{min-height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center}
    .crest{width:58px;height:58px;filter:drop-shadow(0 0 18px rgba(125,247,255,.45))}
    .crest.big{width:118px;height:118px}
    .brand{font-family:Orbitron,sans-serif;font-size:46px;font-weight:900;letter-spacing:.12em;text-shadow:0 0 24px rgba(125,247,255,.28)}
    .sub{color:var(--muted);line-height:1.55;font-size:14px;max-width:340px}
    .core-ring{position:relative;width:250px;height:250px;display:grid;place-items:center;margin:20px 0}
    .core-ring:before,.core-ring:after{content:"";position:absolute;border-radius:50%;border:1px solid rgba(125,247,255,.22);inset:18px;animation:spin 18s linear infinite}
    .core-ring:after{inset:48px;border-style:dashed;animation-direction:reverse;animation-duration:12s}
    @keyframes spin{to{transform:rotate(360deg)}}
    .bootbar{width:230px;height:10px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid rgba(255,255,255,.07);margin-top:18px}
    .bootbar span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--red),var(--amber),var(--cyan));animation:boot 2.2s ease forwards}
    @keyframes boot{to{width:100%}}
    .card{position:relative;border-radius:var(--radius);border:1px solid var(--line);background:linear-gradient(180deg,rgba(12,28,52,.90),rgba(4,12,25,.94));box-shadow:0 22px 70px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.04);padding:18px;overflow:hidden;min-width:0}
    .card:before{content:"";position:absolute;inset:0;background:linear-gradient(130deg,rgba(255,255,255,.05),transparent 36%,rgba(125,247,255,.04));pointer-events:none}
    .danger{border-color:rgba(255,77,109,.35);box-shadow:0 0 0 1px rgba(255,77,109,.08),0 22px 70px rgba(255,0,70,.08)}
    .tag{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.04);border-radius:999px;padding:8px 11px;font-size:11px;font-weight:900;letter-spacing:.08em;color:#dff8ff;text-transform:uppercase}
    h1,h2,h3,h4,p{position:relative;z-index:1}
    h1{font-size:34px;line-height:1.04;margin:12px 0 10px;letter-spacing:-.04em}
    h2{font-size:26px;margin:0 0 6px}
    h3{font-size:21px;margin:0}
    h4{font-size:16px;margin:0 0 6px;overflow-wrap:anywhere}
    p{color:var(--muted);line-height:1.55;margin:0;font-size:14px;overflow-wrap:anywhere}
    .red{color:#ff8ca0;font-weight:900}.cyan{color:#9bfbff;font-weight:900}.amber{color:#ffdc82;font-weight:900}.green{color:#8dffbf;font-weight:900}
    .btn{position:relative;z-index:2;width:100%;border:0;border-radius:18px;padding:14px 14px;font-weight:900;font-size:15px;background:linear-gradient(90deg,#71c0ff,#baf0ff);color:#03111f;box-shadow:0 16px 34px rgba(67,150,255,.25)}
    .btn.secondary{background:rgba(255,255,255,.055);color:var(--text);border:1px solid rgba(255,255,255,.10);box-shadow:none}
    .btn.dangerBtn{background:linear-gradient(90deg,#ff4d6d,#ff9a57);color:#22020b}
    .stack{display:grid;gap:12px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    .top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
    .id{display:flex;align-items:center;gap:12px;min-width:0}.id>div{min-width:0}
    .avatar{width:64px;height:64px;flex:0 0 64px;border-radius:19px;background:rgba(125,247,255,.08);border:1px solid rgba(125,247,255,.22);display:grid;place-items:center;overflow:hidden;background-size:cover;background-position:center}
    .rank{flex:0 0 auto;text-align:right;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:10px 12px;background:rgba(255,255,255,.04)}
    .rank b{display:block;font-family:Orbitron;font-size:22px}.rank span{font-size:10px;color:var(--muted);font-weight:900;letter-spacing:.1em}
    .stat{padding:14px;border-radius:20px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.035);min-width:0}
    .stat b{font-family:Orbitron;font-size:24px;display:block;overflow-wrap:anywhere}.stat span{font-size:12px;color:var(--muted)}
    .bar{height:12px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid rgba(255,255,255,.05);margin-top:10px}
    .bar span{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--red),var(--amber),var(--cyan));box-shadow:0 0 18px rgba(125,247,255,.35)}
    .order{display:grid;gap:12px}
    .orderCard{border-radius:22px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.035);padding:15px;min-width:0}
    .orderHead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .pill{display:inline-flex;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);border-radius:999px;padding:7px 9px;font-size:10px;color:#dff6ff;font-weight:900;white-space:nowrap}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .small{font-size:12px;color:var(--muted);line-height:1.45}
    .nav{position:absolute;left:10px;right:10px;bottom:calc(12px + var(--safe));display:flex;gap:6px;overflow-x:auto;padding:8px;border-radius:26px;background:rgba(3,10,22,.93);border:1px solid rgba(255,255,255,.08);box-shadow:0 18px 50px rgba(0,0,0,.44);z-index:20}
    .nav::-webkit-scrollbar{display:none}
    .nav button{flex:0 0 62px;border:0;border-radius:18px;background:transparent;color:#7f94a9;padding:9px 3px;font-size:9px;font-weight:900;letter-spacing:.03em}
    .nav button.active{background:rgba(125,247,255,.12);color:#fff}
    .nav svg{width:18px;height:18px;display:block;margin:0 auto 4px}
    .fab{position:absolute;right:18px;bottom:108px;width:58px;height:58px;border:0;border-radius:20px;background:linear-gradient(180deg,#86d7ff,#4ea4ff);box-shadow:0 18px 40px rgba(70,150,255,.38);font-size:24px;font-weight:900;z-index:21}
    .modal{position:absolute;inset:0;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(0,3,10,.74);backdrop-filter:blur(10px);z-index:50}
    .modal.show{display:flex}
    .holo{width:100%;max-width:420px;max-height:94dvh;border-radius:30px;border:1px solid rgba(125,247,255,.32);background:linear-gradient(180deg,rgba(6,24,46,.96),rgba(1,8,18,.98));box-shadow:0 30px 100px rgba(0,0,0,.7),0 0 55px rgba(85,183,255,.22);padding:20px;overflow:hidden}
    .holoTitle{font-family:Orbitron;font-weight:900;letter-spacing:.12em;font-size:15px;margin-bottom:12px;color:#e9fdff}
    .holoBody{max-height:60dvh;overflow:auto;border-radius:22px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.07);padding:16px;white-space:pre-wrap;line-height:1.6;font-size:15px;overflow-wrap:anywhere}
    .holoBody::-webkit-scrollbar{width:0}
    input,textarea{width:100%;border-radius:18px;border:1px solid rgba(125,247,255,.17);background:rgba(0,0,0,.25);color:var(--text);padding:14px;font-size:16px;outline:0}
    textarea{min-height:110px;resize:vertical}
    .timer{font-family:Orbitron;font-size:22px;color:#fff}.counter{font-family:Orbitron;font-size:42px;text-align:center;margin:12px 0}
    .hiddenQuest{border-color:rgba(255,210,107,.40);box-shadow:0 0 0 1px rgba(255,210,107,.12),0 18px 60px rgba(255,180,60,.10)}
    .toast{position:absolute;left:50%;bottom:104px;transform:translateX(-50%);width:min(88%,360px);background:rgba(4,13,26,.96);border:1px solid rgba(125,247,255,.18);border-radius:18px;padding:13px 14px;color:#eafaff;opacity:0;pointer-events:none;transition:.25s;z-index:60}.toast.show{opacity:1}
    @media(max-width:390px){.grid2,.grid3{grid-template-columns:1fr}.actions{grid-template-columns:1fr}.brand{font-size:38px}h1{font-size:30px}.screen{padding-inline:13px}.nav button{flex-basis:58px}.stat b{font-size:22px}}
  
    /* v29 stability restore */
    .screen{padding-bottom:calc(168px + var(--safe))!important}
    .nav{display:none;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;overflow:visible!important;left:10px;right:10px;bottom:calc(10px + var(--safe));padding:8px}
    .nav button{flex:auto!important;width:auto!important;min-width:0!important;font-size:9px;line-height:1.1}
    .fab{bottom:154px!important}
    .holo{max-height:96dvh!important}
    .holoBody{max-height:70dvh!important;overflow:auto!important}
    .form-block{display:grid;gap:12px;text-align:left}
    .field-card{border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.035);border-radius:18px;padding:12px}
    .field-card label{display:block;font-size:12px;color:#9bfbff;font-weight:900;letter-spacing:.04em;margin-bottom:6px;text-transform:uppercase}
    .field-card small{display:block;color:var(--muted);font-size:11px;line-height:1.35;margin-top:6px}
    .field-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .field-grid .field-card{min-width:0}
    .countdown-live{font-weight:900;color:#9bfbff}
    .countdown-live.danger-time{color:#ff8ca0}
    .core-grid{display:grid;gap:12px}
    @media(max-width:390px){.nav{grid-template-columns:repeat(4,minmax(0,1fr))}.field-grid{grid-template-columns:1fr}.screen{padding-bottom:calc(178px + var(--safe))!important}.fab{bottom:164px!important}}

  </style>
</head>
<body>
<div class="app">
  <div class="phone">
    <div id="screen" class="screen"></div>
    <div id="nav" class="nav" style="display:none"></div>
    <button id="fab" class="fab" style="display:none">⚡</button>
    <div id="modal" class="modal"></div>
    <div id="toast" class="toast"></div>
  </div>
</div>
<script>
const STORAGE_KEY='ARISE_SYSTEM_V28_ENGINE';
const DAY_MS=86400000;
const $=id=>document.getElementById(id);
const screen=$('screen'), nav=$('nav'), modal=$('modal'), fab=$('fab'), toast=$('toast');
const crest=(cls='')=>`<svg class="crest ${cls}" viewBox="0 0 256 256" fill="none"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f6fdff"/><stop offset=".52" stop-color="#8df7ff"/><stop offset="1" stop-color="#809dff"/></linearGradient></defs><path d="M128 18 52 58v78l76 102 76-102V58L128 18Z" fill="url(#g)" opacity=".95"/><path d="M128 40 76 68v60l52 72 52-72V68l-52-28Z" stroke="#03111f" stroke-width="10"/><path d="M128 42v155M90 78l38 24 38-24M101 132l27-35 27 35M108 158h40" stroke="#03111f" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const icon=n=>({
 status:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19h16M7 16V8m5 8V5m5 11v-6" stroke-linecap="round"/></svg>',
 orders:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 7h12M8 12h12M8 17h12M4 7h.01M4 12h.01M4 17h.01"/></svg>',
 proof:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7a3 3 0 013-3h10a3 3 0 013 3v10a3 3 0 01-3 3H7a3 3 0 01-3-3V7z"/><path d="M8 12l2.5 2.5L16 9"/></svg>',
 penalty:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3l8 4v5c0 5-3.5 8-8 9-4.5-1-8-4-8-9V7l8-4z"/><path d="M12 8v5M12 16h.01"/></svg>',
 analysis:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M5 19l4-6 3 3 6-10"/><path d="M5 5h14v14" opacity=".3"/></svg>',
 profile:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 12a4 4 0 100-8 4 4 0 000 8z"/><path d="M4.5 20a7.5 7.5 0 0115 0"/></svg>',
 core:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2l2.2 4.5 4.8.7-3.5 3.4.8 4.9L12 13.3 7.7 15.5l.8-4.9L5 7.2l4.8-.7L12 2z"/></svg>'
}[n]||'');
const defaultState={
 booted:false, accepted:false, active:'status', dayKey:'',
 profile:{name:'',age:19,gender:'Male',height:167,weight:57,targetWeight:63,goal:'Build Muscle',condition:'Slim / Underdeveloped',activity:'Lightly Active',frequency:4,sleep:6.5,water:2.1,avatarData:'',ability:{pushup:10,squat:20,situp:15,plank:30,runKmTime:10}},
 player:{level:1,exp:0,nextExp:300,rank:'E',statPoints:0,streak:0,totalClears:0},
 stats:{strength:12,vitality:13,agility:11,recovery:10,discipline:16},
 system:{protocolName:'Adaptive Hunter Protocol',calorieGoal:2450,waterGoal:3.0,macros:{protein:145,carbs:290,fat:67},bmi:20.4,bmiLabel:'Healthy',estimated90DayWeight:62},
 quests:[], hiddenQuests:[], logs:[], proofRecords:[], penalty:{active:false,severity:0,tasks:[],fromPreviousDay:false}, previousDay:{key:'',completion:null,failed:false}, ai:{enabled:true,model:'gemini-2.5-flash'}, push:{enabled:false,token:'',lastPermission:'default'}
};
let state=load();
function load(){try{return merge(JSON.parse(JSON.stringify(defaultState)),JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'))}catch{return JSON.parse(JSON.stringify(defaultState))}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function merge(a,b){for(const k in b){if(b[k]&&typeof b[k]=='object'&&!Array.isArray(b[k]))a[k]=merge(a[k]||{},b[k]);else a[k]=b[k]}return a}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function todayKey(){return new Date().toISOString().slice(0,10)}
function nextMidnight(){
 const d=new Date(); d.setHours(24,0,0,0); return d.getTime();
}
function toastMsg(m){toast.textContent=m;toast.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>toast.classList.remove('show'),2400)}
function rankFromLevel(l){return l>=70?'S':l>=50?'A':l>=35?'B':l>=20?'C':l>=10?'D':'E'}
function calcSystem(){
 const p=state.profile,h=p.height/100,bmi=+(p.weight/(h*h)).toFixed(1);
 state.system.bmi=bmi; state.system.bmiLabel=bmi<18.5?'Underweight':bmi>=30?'Obese':bmi>=25?'Overweight':'Healthy';
 const bmr=10*p.weight+6.25*p.height-5*p.age+(p.gender==='Male'?5:-161);
 const mult={Sedentary:1.2,'Lightly Active':1.37,'Moderately Active':1.55,'Very Active':1.72}[p.activity]||1.37;
 const factor=p.goal==='Build Muscle'?1.15:p.goal==='Lose Weight'?.9:1;
 state.system.calorieGoal=Math.round(bmr*mult*factor);
 if(p.goal==='Build Muscle')state.system.calorieGoal+=180;
 state.system.macros={protein:Math.round(p.targetWeight*2.1),fat:Math.round((state.system.calorieGoal*.25)/9),carbs:0};
 state.system.macros.carbs=Math.round((state.system.calorieGoal-state.system.macros.protein*4-state.system.macros.fat*9)/4);
 state.system.waterGoal=+(Math.max(2.5,p.weight*.04).toFixed(1));
 state.system.estimated90DayWeight=p.goal==='Lose Weight'?Math.max(p.targetWeight,p.weight-6):Math.min(p.targetWeight,p.weight+5);
 state.system.protocolName=(p.goal==='Build Muscle'?'Muscle Ascension':p.goal==='Lose Weight'?'Shadow Cut':p.goal==='Stay In Shape'?'Sustain':'Aesthetic Awakening')+' Protocol';
}
function questTarget(base, stat, mult=1){return Math.round(base+(state.player.level*1.8)+(state.stats[stat]||10)*mult)}
function generateDailyQuests(){
 calcSystem();
 const p=state.profile, lvl=state.player.level, r=state.player.rank;
 const push=clamp(questTarget(18,'strength',.85),15,220);
 const squat=clamp(questTarget(28,'vitality',1.0),25,260);
 const sit=clamp(questTarget(20,'strength',.55),15,180);
 const plank=clamp(questTarget(45,'recovery',2.2),40,520);
 const walk=clamp(3500+lvl*120+state.stats.agility*80,3000,16000);
 const deadline=nextMidnight();
 const q=[
  {id:id(),title:'Current Order: Push Discipline',type:'STRENGTH',stat:'strength',kind:'counter',target:push,progress:0,unit:'reps',exp:120+lvl*8,deadline,proofNote:'',done:false,desc:`Selesaikan ${push} push-up total. Pecah beberapa set jika perlu, tapi jangan bersembunyi di balik alasan.`},
  {id:id(),title:'Current Order: Lower Body Rise',type:'VITALITY',stat:'vitality',kind:'counter',target:squat,progress:0,unit:'reps',exp:110+lvl*8,deadline,proofNote:'',done:false,desc:`Selesaikan ${squat} squat total dengan tempo bersih.`},
  {id:id(),title:'Current Order: Core Ignition',type:'STRENGTH',stat:'strength',kind:'counter',target:sit,progress:0,unit:'reps',exp:105+lvl*7,deadline,proofNote:'',done:false,desc:`Selesaikan ${sit} sit-up/crunch total. Core lemah tidak akan naik rank.`},
  {id:id(),title:'Current Order: Core Lock',type:'RECOVERY',stat:'recovery',kind:'timer',target:plank,progress:0,unit:'sec',exp:130+lvl*8,deadline,proofNote:'',done:false,desc:`Tahan plank total ${plank} detik. Timer proof tersedia.`},
  {id:id(),title:'Current Order: Daily Motion',type:'AGILITY',stat:'agility',kind:'counter',target:walk,progress:0,unit:'steps',exp:140+lvl*9,deadline,proofNote:'',done:false,desc:`Catat ${walk.toLocaleString('id-ID')} langkah atau estimasi jalan cepat.`},
  {id:id(),title:'Current Order: Water Discipline',type:'RECOVERY',stat:'recovery',kind:'counter',target:Math.round(state.system.waterGoal*10),progress:0,unit:'cups x10',exp:80+lvl*5,deadline,proofNote:'',done:false,desc:`Penuhi hidrasi ${state.system.waterGoal} liter. Input dalam satuan 0.1 liter.`}
 ];
 state.quests=q; state.hiddenQuests=[]; state.dayKey=todayKey(); save();
}
function ensureDay(){
 if(!state.dayKey){
   state.dayKey=todayKey();
   if(!state.quests.length)generateDailyQuests();
   save();
   return;
 }
 if(state.dayKey!==todayKey()){
   const completion=completionPercent();
   state.previousDay={key:state.dayKey,completion,failed:completion<60};
   state.penalty={active:false,severity:0,tasks:[],fromPreviousDay:false};
   generateDailyQuests();
   if(completion<60){
     activatePenalty(completion<15?3:completion<35?2:1,`Kemarin hanya ${completion}% tervalidasi. Hukuman berlaku hari ini.`, true);
   } else {
     state.player.streak++;
   }
   state.logs.unshift({time:new Date().toLocaleString('id-ID'),type:'DAILY_RESET',text:`New daily order generated. Previous completion ${completion}%.`});
   save();
 }
}
function id(){return Math.random().toString(36).slice(2,9)}
function completionPercent(){const all=[...state.quests,...state.hiddenQuests]; if(!all.length)return 0; return Math.round(all.reduce((s,q)=>s+Math.min(1,(q.progress||0)/q.target),0)/all.length*100)}
function expRatio(){return Math.min(100,Math.round(state.player.exp/state.player.nextExp*100))}
function addExp(amount,stat){
 state.player.exp+=amount; state.stats[stat]=Math.round((state.stats[stat]||10)+Math.max(1,amount/160));
 state.player.totalClears++;
 let leveled=false, old=state.player.level;
 while(state.player.exp>=state.player.nextExp){state.player.exp-=state.player.nextExp;state.player.level++;state.player.statPoints+=3;state.player.nextExp=Math.round(state.player.nextExp*1.18+90);leveled=true}
 const oldRank=state.player.rank; state.player.rank=rankFromLevel(state.player.level);
 save();
 if(leveled)showTransmission('LEVEL UP',`LEVEL ${old} → LEVEL ${state.player.level}

STAT POINT +3
${stat.toUpperCase()} meningkat.

SYSTEM NOTE:
Kenaikan level bukan hadiah belas kasihan. Itu bukti bahwa tubuhmu dipaksa bergerak dan data mengakuinya.${oldRank!==state.player.rank?`

 $('close').onclick=()=>{closeModal(); if(first)render()};
 $('saveP').onclick=()=>{
  p.name=$('name').value.trim()||'Unknown';p.age=+$('age').value||19;p.height=+$('height').value||167;p.weight=+$('weight').value||57;p.targetWeight=+$('target').value||63;
  p.ability.pushup=+$('push').value||0;p.ability.squat=+$('squat').value||0;p.ability.situp=+$('situp').value||0;p.ability.plank=+$('plank').value||0;
  state.accepted=true;calcSystem();generateDailyQuests();save();closeModal();showTransmission('SYSTEM ONLINE',fallbackMessage());render()
 };
}
async function enablePush(){
 try{
  if(!('Notification'in window)||!('serviceWorker'in navigator))throw new Error('Browser tidak mendukung push.');
  const perm=await Notification.requestPermission();state.push.lastPermission=perm;save();
  if(perm!=='granted')return toastMsg('Izin notifikasi belum aktif.');
  await navigator.serviceWorker.register('/firebase-messaging-sw.js');
  toastMsg('Service worker aktif. Push siap jika token/server tersedia.');
 }catch(e){toastMsg(e.message)}
}
