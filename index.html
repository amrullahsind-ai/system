<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#06142b" />
  <title>ARISE — System Ascension Protocol</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root{
      --bg:#03101f;
      --panel:#091a31;
      --panel-2:#0c2140;
      --line:rgba(127,190,255,.18);
      --line-2:rgba(255,255,255,.08);
      --text:#eef7ff;
      --muted:#a8bfd8;
      --danger:#ff6d80;
      --warn:#ffc860;
      --green:#6df0a8;
      --blue:#84c9ff;
      --blue-2:#44a7ff;
      --shadow:0 14px 42px rgba(0,0,0,.38);
      --radius:24px;
      --radius-sm:18px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:
        radial-gradient(circle at top right, rgba(46,127,255,.22), transparent 28%),
        radial-gradient(circle at bottom left, rgba(77,228,255,.16), transparent 26%),
        linear-gradient(180deg,#020a15 0%, #051426 42%, #081b34 100%);
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      overflow-x:hidden;
    }
    .app{max-width:450px;margin:0 auto;min-height:100%;position:relative;padding:18px 16px 108px}
    .screen{display:block;animation:fade .25s ease}
    @keyframes fade{from{opacity:.0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .center{min-height:calc(100vh - 126px);display:flex;flex-direction:column;justify-content:center;gap:18px}
    .card,.panel,.quest,.modal-card,.hero,.mini{background:linear-gradient(180deg,rgba(17,39,76,.95),rgba(8,24,48,.95));border:1px solid var(--line);box-shadow:var(--shadow);border-radius:var(--radius);padding:18px}
    .mini{border-radius:18px;padding:14px}
    .hero{padding:22px}
    .brand{display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px}
    .brand h1{margin:0;font-size:44px;letter-spacing:.14em}
    .sub{color:var(--muted);font-size:14px;line-height:1.5}
    .tag{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#bcd8f5;border:1px solid var(--line);background:rgba(255,255,255,.04);padding:8px 12px;border-radius:999px}
    .crest{width:92px;height:92px;filter:drop-shadow(0 0 18px rgba(125,196,255,.28))}
    .title{font-size:31px;line-height:1.08;margin:0}
    .danger{color:var(--danger);font-weight:800}
    .btn{width:100%;border:0;background:linear-gradient(180deg,#76c4ff,#3598ff);color:#04162e;border-radius:18px;padding:15px 16px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 10px 24px rgba(53,152,255,.25)}
    .btn.secondary{background:rgba(255,255,255,.06);color:var(--text);box-shadow:none;border:1px solid var(--line)}
    .btn.ghost{background:transparent;color:#c8def6;border:1px dashed var(--line)}
    .btn.hold{position:relative;overflow:hidden}
    .btn.hold::before{content:'';position:absolute;inset:0;width:var(--hold,0%);background:linear-gradient(90deg,rgba(255,255,255,.2),rgba(255,255,255,.02));pointer-events:none}
    .stack{display:grid;gap:12px}
    .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px}
    .topbar p,.small,.meta,.muted{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);font-size:12px;color:#dbedff}
    .progress{height:10px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid rgba(255,255,255,.06)}
    .progress > span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ff7e69,#ffd24d,#6df0a8);border-radius:inherit;transition:width .25s ease}
    .grid{display:grid;gap:12px}
    .grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.kpi{grid-template-columns:repeat(2,minmax(0,1fr))}
    .identity{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .identity-left{display:flex;gap:14px;align-items:center;min-width:0}
    .avatar{width:72px;height:72px;border-radius:20px;background:linear-gradient(180deg,rgba(146,213,255,.16),rgba(255,255,255,.04));border:1px solid var(--line);display:flex;align-items:center;justify-content:center;background-size:cover;background-position:center}
    .rank{padding:10px 14px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.04);text-align:center;min-width:82px}
    .rank b{display:block;font-size:28px;line-height:1}
    .inline{display:flex;gap:10px;flex-wrap:wrap}
    .kpi-num{font-size:22px;font-weight:800}
    .section{display:flex;justify-content:space-between;gap:12px;align-items:flex-end;margin:20px 0 10px}
    .section h3{margin:0;font-size:18px}
    .stat-line{margin-bottom:12px}
    .stat-line:last-child{margin-bottom:0}
    .stat-row{display:flex;justify-content:space-between;gap:8px;font-size:14px}
    .stats-window{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}
    .quest{padding:16px;border-radius:22px}
    .quest.done{border-color:rgba(109,240,168,.28);background:linear-gradient(180deg,rgba(18,61,52,.96),rgba(8,29,28,.96))}
    .quest-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .quest h4{margin:0 0 6px;font-size:17px;line-height:1.25}
    .quest p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
    .quest-pill{font-size:11px;padding:8px 10px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);white-space:nowrap}
    .quest-actions{display:grid;gap:10px;grid-template-columns:1fr 1fr;margin-top:14px}
    .countdown{font-size:12px;color:#cfe6ff}
    .list{display:grid;gap:12px}
    .warning{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;border-radius:18px;background:rgba(255,96,118,.09);border:1px solid rgba(255,109,128,.16);font-size:13px;line-height:1.45;color:#ffe7ea}
    .warning-dot{width:9px;height:9px;border-radius:50%;background:var(--danger);margin-top:6px;box-shadow:0 0 0 6px rgba(255,109,128,.12)}
    .field{display:grid;gap:9px}
    .field label{font-size:13px;color:#d5e9ff}
    .input, select, textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:16px;color:var(--text);padding:14px 14px;font-size:15px;outline:none}
    textarea{resize:vertical;min-height:82px}
    .options{display:grid;gap:10px}
    .option{display:flex;align-items:flex-start;gap:10px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:18px;padding:14px;cursor:pointer}
    .option.active{border-color:rgba(112,204,255,.45);background:rgba(68,167,255,.10)}
    .check{width:20px;height:20px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex:0 0 auto;margin-top:1px}
    .option.active .check{background:#5ab6ff;color:#031220;border-color:transparent}
    .bottom-nav{position:fixed;left:50%;transform:translateX(-50%);bottom:10px;width:min(450px,calc(100% - 20px));background:rgba(7,16,30,.84);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:10px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;box-shadow:0 16px 30px rgba(0,0,0,.35)}
    .nav-btn{border:0;background:transparent;color:#bdd8f5;border-radius:18px;padding:10px 8px;display:grid;justify-items:center;gap:6px;font-size:11px;cursor:pointer}
    .nav-btn.active{background:rgba(77,170,255,.16);color:#fff}
    .fab{position:fixed;right:max(calc((100vw - min(450px,100vw))/2 + 18px),18px);bottom:92px;width:54px;height:54px;border-radius:50%;border:0;background:linear-gradient(180deg,#7cd8ff,#4ba5ff);color:#06203d;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 24px rgba(53,152,255,.3);cursor:pointer}
    .hidden{display:none !important}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.48);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;padding:16px;z-index:40}
    .modal-card{max-width:450px;width:100%;max-height:88vh;overflow:auto}
    .modal-card h3{margin:0 0 12px}
    .holo{position:fixed;inset:0;background:rgba(0,0,0,.58);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50}
    .holo-card{max-width:430px;width:100%;background:linear-gradient(180deg,rgba(7,21,39,.98),rgba(6,15,29,.98));border-radius:26px;padding:18px;border:1px solid rgba(120,195,255,.26);box-shadow:0 26px 56px rgba(0,0,0,.45)}
    .holo-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}
    .holo-title{display:flex;align-items:center;gap:10px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#d9edff}
    .orb{width:12px;height:12px;border-radius:50%;background:#78c7ff;box-shadow:0 0 0 7px rgba(120,199,255,.12),0 0 22px rgba(120,199,255,.62)}
    .big-read{font-size:56px;font-weight:900;letter-spacing:.04em;text-align:center;padding:8px 0 2px}
    .holo-body{white-space:pre-wrap;line-height:1.55;color:#ebf6ff;font-size:15px;min-height:110px}
    .footer-actions{display:grid;gap:10px;grid-template-columns:1fr 1fr;margin-top:14px}
    .chart{padding:16px;border-radius:20px;border:1px solid var(--line);background:rgba(255,255,255,.03)}
    .proof-img{width:100%;border-radius:14px;margin-top:10px;border:1px solid var(--line)}
    .empty{padding:18px;border-radius:18px;border:1px dashed var(--line);color:var(--muted);text-align:center}
    .footer-space{height:86px}
    .tiny{font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="app">
    <div id="app"></div>
  </div>
  <div id="modalRoot"></div>
  <div id="overlayRoot"></div>
  <div id="bottomNav" class="bottom-nav hidden"></div>
  <button id="fab" class="fab hidden">＋</button>

  <script>
    const STORAGE_KEY = 'arise-system-v27';
    const EXP_TABLE = [0,300,700,1200,1900,2800,3900,5200,6800,8600,10800,13400,16400,19800,23600,27900,32700,38000,43800,50100,57000,64500];
    const defaultState = {
      booted:false,
      accepted:false,
      onboardingDone:false,
      assessmentStep:0,
      ui:{ tab:'status' },
      profile:{
        name:'', age:19, gender:'Male', height:167, weight:57, targetWeight:63,
        goal:'Build Muscle', condition:'Slim / Underdeveloped', activity:'Lightly Active',
        motivation:'Discipline', frequency:4, sleep:6.5, water:2.1,
        focus:['Full Body'], notes:'', avatarData:'',
        ability:{ pushup:10, squat:20, situp:15, plank:30, runKmTime:10 }
      },
      system:{
        className:'Fighter', rank:'E', title:'Candidate', level:1, exp:0, coins:0, statPoints:0,
        currentStats:{str:12,agi:11,vit:13,int:10,per:16}, potentialStats:{str:82,agi:78,vit:84,int:80,per:88},
        hp:{current:84,max:100}, mp:{current:72,max:100}, physiqueUse:28, wastedPotential:72,
        bmi:20.4, bmiLabel:'Healthy', waterGoal:3.0, calorieGoal:2450,
        macros:{protein:145,carbs:290,fat:67}, weeklyWorkouts:4, estimated90DayWeight:62,
        protocolName:'Ascension Strength Protocol'
      },
      quests:[], proofs:[], history:[],
      daily:{ date:'', streak:0, bestStreak:0 },
      logs:[]
    };

    const steps = [
      { key:'name', title:'Masukkan identitas player', subtitle:'Nama ini akan muncul pada jendela status SYSTEM.', type:'text' },
      { key:'age', title:'Berapa umurmu?', subtitle:'Dipakai untuk menghitung baseline metabolik.', type:'number', min:13, max:60 },
      { key:'body', title:'Tinggi, berat, dan target', subtitle:'SYSTEM perlu titik awal dan arah target.', type:'body' },
      { key:'goal', title:'Apa tujuan utamamu?', subtitle:'Class awal dan quest akan dipengaruhi tujuan ini.', type:'single', options:['Build Muscle','Lose Weight','Look Better','Stay In Shape'] },
      { key:'condition', title:'Bagaimana kondisi awalmu?', subtitle:'Jujur lebih baik daripada gagah-gagahan.', type:'single', options:['Slim / Underdeveloped','Average','Sedentary / Weak','Overweight','Already Training'] },
      { key:'activity', title:'Seberapa aktif harianmu?', subtitle:'Aktivitas harian memengaruhi beban quest.', type:'single', options:['Sedentary','Lightly Active','Moderately Active','Very Active'] },
      { key:'rhythm', title:'Seberapa sering kamu akan latihan?', subtitle:'Frekuensi, tidur, dan air menentukan recovery.', type:'rhythm' },
      { key:'focus', title:'Bagian tubuh yang ingin diprioritaskan?', subtitle:'Fokus membantu SYSTEM menonjolkan class build.', type:'multi', options:['Full Body','Back','Arms','Shoulders','Abs','Legs','Chest'] },
      { key:'ability', title:'Masukkan kemampuan awal', subtitle:'Angka ini jadi dasar tantangan per level.', type:'ability' },
      { key:'notes', title:'Ada catatan tambahan?', subtitle:'Cedera ringan, kendala, atau preferensi khusus.', type:'notes' }
    ];

    let state = loadState();
    const app = document.getElementById('app');
    const modalRoot = document.getElementById('modalRoot');
    const overlayRoot = document.getElementById('overlayRoot');
    const bottomNav = document.getElementById('bottomNav');
    const fab = document.getElementById('fab');

    init();

    function init(){
      migrateState();
      if(state.onboardingDone){
        maybeRolloverDay();
        if(!state.quests.length) state.quests = generateQuests();
      }
      saveState();
      render();
      setInterval(updateCountdowns, 1000);
    }

    function crest(size='92'){
      return `
        <svg class="crest" viewBox="0 0 256 256" width="${size}" height="${size}" aria-hidden="true">
          <defs>
            <linearGradient id="cg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="55%" stop-color="#92d4ff"/>
              <stop offset="100%" stop-color="#4aa4ff"/>
            </linearGradient>
          </defs>
          <path d="M128 20 54 56v74c0 55 35 88 74 106 39-18 74-51 74-106V56L128 20Z" fill="rgba(112,194,255,.10)" stroke="rgba(112,194,255,.35)" stroke-width="3"/>
          <path d="M128 38 72 66v58c0 40 25 67 56 83 31-16 56-43 56-83V66l-56-28Z" fill="rgba(5,20,38,.75)" stroke="url(#cg)" stroke-width="4"/>
          <path d="M128 58 98 90l18 13-14 18 26 42 26-42-14-18 18-13-30-32Z" fill="url(#cg)" opacity=".98"/>
          <path d="M90 146h76M100 128h56M110 110h36" stroke="rgba(146,212,255,.42)" stroke-width="3" stroke-linecap="round"/>
          <path d="M104 177h48" stroke="url(#cg)" stroke-width="6" stroke-linecap="round"/>
        </svg>`;
    }

    function render(){
      if(!state.booted) return renderSplash();
      if(!state.accepted) return renderAcceptance();
      if(!state.onboardingDone) return renderAssessment();
      renderDashboard();
    }

    function renderSplash(){
      hideNav();
      app.innerHTML = `
        <section class="screen center">
          <div class="brand">
            ${crest()}
            <h1>ARISE</h1>
            <div class="sub">SYSTEM ASCENSION PROTOCOL · membaca kapasitas, memberi order, dan menaikkan level hidupmu.</div>
          </div>
          <div class="hero">
            <div class="tag">BOOT SEQUENCE</div>
            <h2 class="title">No excuses. Only <span class="danger">execution</span>.</h2>
            <p class="sub" style="margin-top:12px">Memuat player profile, quest engine per level, proof station, dan analysis matrix.</p>
            <div class="list" style="margin-top:14px">
              <div class="mini"><b>HUD</b><div class="small">Antarmuka holografik disiapkan.</div></div>
              <div class="mini"><b>QUEST ENGINE</b><div class="small">Tantangan akan berbeda di tiap level.</div></div>
              <div class="mini"><b>CORE</b><div class="small">Local system logic siap dijalankan.</div></div>
            </div>
          </div>
          <div class="progress"><span style="width:100%"></span></div>
        </section>`;
      setTimeout(() => { state.booted = true; saveState(); render(); }, 1800);
    }

    function renderAcceptance(){
      hideNav();
      app.innerHTML = `
        <section class="screen center">
          <div class="brand">
            ${crest()}
            <h1 style="font-size:46px">ARISE</h1>
            <div class="sub">SYSTEM bukan sekadar pengingat. SYSTEM mengukur, mengadili, dan memberi perintah.</div>
          </div>
          <div class="hero">
            <div class="tag">SYSTEM NOTICE</div>
            <h2 class="title">You have acquired the qualifications to become a <span style="color:var(--green)">Player</span>.</h2>
            <p class="sub" style="margin-top:12px">Begitu diterima, level, EXP, dan quest harianmu akan dipantau. Kegagalan menyelesaikan order akan dibalas dengan stagnasi, bukan simpati.</p>
            <div class="warning" style="margin-top:16px"><span class="warning-dot"></span><div><span class="danger">PERINGATAN:</span> Player yang lemah kemauan akan tertinggal. SYSTEM hanya mengakui disiplin.</div></div>
          </div>
          <div class="stack">
            <button class="btn hold" id="holdAccept">Tahan untuk menerima SYSTEM</button>
            <button class="btn secondary" id="rejectBtn">Nanti saja</button>
          </div>
          <div class="small" style="text-align:center">Tahan 1.4 detik untuk mengunci keputusan.</div>
        </section>`;
      const btn = document.getElementById('holdAccept');
      const reject = document.getElementById('rejectBtn');
      let hold = 0, timer = null;
      const start = () => {
        hold = 0; btn.style.setProperty('--hold', '0%');
        timer = setInterval(() => {
          hold += 4;
          btn.style.setProperty('--hold', hold + '%');
          if(hold >= 100){
            clearInterval(timer);
            state.accepted = true;
            saveState();
            render();
          }
        }, 56);
      };
      const stop = () => { if(timer) clearInterval(timer); if(hold < 100) btn.style.setProperty('--hold', '0%'); };
      ['mousedown','touchstart','pointerdown'].forEach(evt => btn.addEventListener(evt, start, {passive:true}));
      ['mouseup','mouseleave','touchend','touchcancel','pointerup','pointercancel'].forEach(evt => btn.addEventListener(evt, stop, {passive:true}));
      reject.onclick = () => toast('SYSTEM menunggu saat kamu siap.');
    }

    function renderAssessment(){
      hideNav();
      const step = steps[state.assessmentStep];
      const progress = Math.round((state.assessmentStep / steps.length) * 100);
      app.innerHTML = `
        <section class="screen">
          <div class="topbar">
            <button class="btn secondary" style="width:auto;padding:12px 14px" id="backBtn">←</button>
            <div class="tag">ASSESSMENT ${String(state.assessmentStep + 1).padStart(2,'0')} / ${steps.length}</div>
            <button class="btn secondary" style="width:auto;padding:12px 14px" id="skipBtn">⋯</button>
          </div>
          <div class="progress"><span style="width:${progress}%"></span></div>
          <div class="card" style="margin-top:16px">
            <h2 class="title" style="font-size:28px">${step.title}</h2>
            <p class="sub" style="margin-top:10px">${step.subtitle}</p>
            <div id="stepBody" style="margin-top:18px"></div>
            <div class="stack" style="margin-top:18px">
              <button class="btn" id="nextBtn">${state.assessmentStep === steps.length - 1 ? 'Jalankan Analisis Player' : 'Lanjutkan'}</button>
              <button class="btn ghost" id="saveBtn">Simpan dulu</button>
            </div>
          </div>
          <div class="small" style="margin-top:12px;text-align:center">Data ini disimpan lokal di browser untuk membentuk SYSTEM milikmu.</div>
        </section>`;
      renderStepBody(step);
      document.getElementById('backBtn').onclick = () => {
        if(state.assessmentStep === 0){ state.accepted = false; saveState(); return render(); }
        state.assessmentStep -= 1; saveState(); renderAssessment();
      };
      document.getElementById('skipBtn').onclick = () => toast('SYSTEM tidak menyukai jawaban setengah-setengah.');
      document.getElementById('saveBtn').onclick = () => { captureCurrentStep(step); saveState(); toast('Assessment tersimpan.'); };
      document.getElementById('nextBtn').onclick = () => {
        captureCurrentStep(step);
        if(!validateStep(step)) return;
        if(state.assessmentStep < steps.length - 1){
          state.assessmentStep += 1;
          saveState();
          renderAssessment();
        } else {
          runAnalysis();
        }
      };
    }

    function renderStepBody(step){
      const wrap = document.getElementById('stepBody');
      const p = state.profile;
      if(step.type === 'text'){
        wrap.innerHTML = `<div class="field"><label>Nama player</label><input class="input" id="stepInput" value="${escapeHtml(p.name)}" placeholder="contoh: Sevila" /></div>`;
        return;
      }
      if(step.type === 'number'){
        wrap.innerHTML = `<div class="field"><label>Umur</label><input class="input" id="stepInput" type="number" min="${step.min}" max="${step.max}" value="${p.age}" /></div>`;
        return;
      }
      if(step.type === 'body'){
        wrap.innerHTML = `
          <div class="grid two">
            <div class="field"><label>Tinggi (cm)</label><input class="input" id="heightInput" type="number" value="${p.height}" min="120" max="220" /></div>
            <div class="field"><label>Berat (kg)</label><input class="input" id="weightInput" type="number" value="${p.weight}" min="30" max="200" step="0.1" /></div>
            <div class="field"><label>Target (kg)</label><input class="input" id="targetInput" type="number" value="${p.targetWeight}" min="30" max="200" step="0.1" /></div>
            <div class="field"><label>Gender</label><select id="genderInput"><option ${p.gender==='Male'?'selected':''}>Male</option><option ${p.gender==='Female'?'selected':''}>Female</option></select></div>
          </div>`;
        return;
      }
      if(step.type === 'single'){
        wrap.innerHTML = `<div class="options">${step.options.map(opt => optionHTML(opt, p[step.key] === opt)).join('')}</div>`;
        wrap.querySelectorAll('.option').forEach(el => el.onclick = () => {
          p[step.key] = el.dataset.value; saveState(); renderStepBody(step);
        });
        return;
      }
      if(step.type === 'multi'){
        const current = new Set(Array.isArray(p[step.key]) ? p[step.key] : []);
        wrap.innerHTML = `<div class="options">${step.options.map(opt => optionHTML(opt, current.has(opt), true)).join('')}</div>`;
        wrap.querySelectorAll('.option').forEach(el => el.onclick = () => {
          const val = el.dataset.value;
          const arr = new Set(Array.isArray(p[step.key]) ? p[step.key] : []);
          arr.has(val) ? arr.delete(val) : arr.add(val);
          p[step.key] = Array.from(arr);
          saveState(); renderStepBody(step);
        });
        return;
      }
      if(step.type === 'rhythm'){
        wrap.innerHTML = `
          <div class="grid two">
            <div class="field"><label>Latihan / minggu</label><input class="input" id="freqInput" type="range" min="1" max="7" value="${p.frequency}" /><div class="tiny">${p.frequency}x per minggu</div></div>
            <div class="field"><label>Motivasi dominan</label><select id="motInput"><option ${p.motivation==='Discipline'?'selected':''}>Discipline</option><option ${p.motivation==='Aesthetic'?'selected':''}>Aesthetic</option><option ${p.motivation==='Health'?'selected':''}>Health</option></select></div>
            <div class="field"><label>Tidur rata-rata / hari</label><input class="input" id="sleepInput" type="number" min="4" max="10" step="0.5" value="${p.sleep}" /></div>
            <div class="field"><label>Air / hari (L)</label><input class="input" id="waterInput" type="number" min="1" max="6" step="0.1" value="${p.water}" /></div>
          </div>`;
        return;
      }
      if(step.type === 'ability'){
        const a = p.ability;
        wrap.innerHTML = `
          <div class="grid two">
            <div class="field"><label>Push-up max</label><input class="input" id="pushupInput" type="number" value="${a.pushup}" min="0" /></div>
            <div class="field"><label>Squat max</label><input class="input" id="squatInput" type="number" value="${a.squat}" min="0" /></div>
            <div class="field"><label>Sit-up max</label><input class="input" id="situpInput" type="number" value="${a.situp}" min="0" /></div>
            <div class="field"><label>Plank max (detik)</label><input class="input" id="plankInput" type="number" value="${a.plank}" min="0" /></div>
            <div class="field"><label>Waktu 1 km (menit)</label><input class="input" id="runInput" type="number" value="${a.runKmTime}" min="3" step="0.5" /></div>
          </div>
          <div class="warning" style="margin-top:14px"><span class="warning-dot"></span><div>Bohong di awal akan membuat quest tidak akurat. SYSTEM lebih suka angka realistis daripada ego yang dibesar-besarkan.</div></div>`;
        return;
      }
      if(step.type === 'notes'){
        wrap.innerHTML = `
          <div class="field"><label>Catatan player</label><textarea class="input" id="notesInput" placeholder="misalnya ada nyeri ringan, waktu kosong tertentu, atau target penampilan tertentu">${escapeHtml(p.notes || '')}</textarea></div>
          <div class="field"><label>Foto player (opsional)</label><input class="input" id="avatarInput" type="file" accept="image/*" /><div class="tiny">Kalau diisi, foto ini tampil di status window.</div></div>`;
        return;
      }
    }

    function optionHTML(text, active, multi=false){
      return `<button type="button" class="option ${active?'active':''}" data-value="${escapeHtml(text)}"><span class="check">${active?'✓':''}</span><span><b>${escapeHtml(text)}</b>${multi?'<br><span class="tiny">Tap untuk memilih / melepas</span>':''}</span></button>`;
    }

    function captureCurrentStep(step){
      const p = state.profile;
      if(step.type === 'text') p.name = document.getElementById('stepInput').value.trim();
      if(step.type === 'number') p.age = clampNum(Number(document.getElementById('stepInput').value || p.age), step.min, step.max);
      if(step.type === 'body'){
        p.height = clampNum(Number(document.getElementById('heightInput').value || p.height), 120, 220);
        p.weight = clampNum(Number(document.getElementById('weightInput').value || p.weight), 30, 200);
        p.targetWeight = clampNum(Number(document.getElementById('targetInput').value || p.targetWeight), 30, 200);
        p.gender = document.getElementById('genderInput').value;
      }
      if(step.type === 'rhythm'){
        p.frequency = clampNum(Number(document.getElementById('freqInput').value || p.frequency), 1, 7);
        p.motivation = document.getElementById('motInput').value;
        p.sleep = clampNum(Number(document.getElementById('sleepInput').value || p.sleep), 4, 10);
        p.water = clampNum(Number(document.getElementById('waterInput').value || p.water), 1, 6);
      }
      if(step.type === 'ability'){
        p.ability.pushup = Math.max(0, Number(document.getElementById('pushupInput').value || 0));
        p.ability.squat = Math.max(0, Number(document.getElementById('squatInput').value || 0));
        p.ability.situp = Math.max(0, Number(document.getElementById('situpInput').value || 0));
        p.ability.plank = Math.max(0, Number(document.getElementById('plankInput').value || 0));
        p.ability.runKmTime = Math.max(3, Number(document.getElementById('runInput').value || 0));
      }
      if(step.type === 'notes'){
        p.notes = document.getElementById('notesInput').value.trim();
        const input = document.getElementById('avatarInput');
        const file = input && input.files && input.files[0];
        if(file) readAvatar(file);
      }
    }

    function validateStep(step){
      const p = state.profile;
      if(step.key === 'name' && !String(p.name || '').trim()) return toast('Masukkan nama player terlebih dahulu.'), false;
      if(step.type === 'multi' && (!Array.isArray(p[step.key]) || !p[step.key].length)) return toast('Pilih minimal satu fokus.'), false;
      if(step.type === 'ability' && (p.ability.pushup + p.ability.squat + p.ability.plank) <= 0) return toast('Masukkan kemampuan awal secara realistis.'), false;
      return true;
    }

    function runAnalysis(){
      captureCurrentStep(steps[state.assessmentStep]);
      app.innerHTML = `
        <section class="screen center">
          <div class="hero">
            <div class="tag">SYSTEM ANALYSIS</div>
            <h2 class="title">Assessment diterima. SYSTEM sedang membaca kondisi player.</h2>
            <p class="sub" style="margin-top:12px">Menghitung baseline, memetakan potensi, memilih class, dan membangun quest pertama.</p>
            <div class="list" style="margin-top:16px">
              <div class="mini"><b>Identity lock</b><div class="small">Mengunci identitas player.</div></div>
              <div class="mini"><b>Body index</b><div class="small">Mengukur komposisi awal.</div></div>
              <div class="mini"><b>Protocol forge</b><div class="small">Menulis order harian level 1.</div></div>
            </div>
            <div class="progress" style="margin-top:16px"><span id="analysisBar" style="width:4%"></span></div>
            <div class="small" id="analysisText" style="margin-top:10px">Memulai analisis...</div>
          </div>
        </section>`;
      let pct = 4;
      const bar = document.getElementById('analysisBar');
      const text = document.getElementById('analysisText');
      const msgs = ['Membaca profil player...','Menghitung kekuatan dan recovery...','Memetakan potential 90 hari...','Menyusun quest berdasarkan level...','Mengunci rank awal...'];
      const timer = setInterval(() => {
        pct += Math.ceil(Math.random() * 10);
        if(pct > 100) pct = 100;
        bar.style.width = pct + '%';
        text.textContent = msgs[Math.min(msgs.length - 1, Math.floor((pct / 100) * msgs.length))];
        if(pct >= 100){
          clearInterval(timer);
          calculateSystem();
          state.onboardingDone = true;
          state.daily.date = todayKey();
          saveState();
          setTimeout(() => render(), 350);
        }
      }, 220);
    }

    function calculateSystem(){
      const p = state.profile;
      const h = p.height / 100;
      const bmi = +(p.weight / (h*h)).toFixed(1);
      let bmiLabel = 'Healthy';
      if(bmi < 18.5) bmiLabel = 'Underweight';
      else if(bmi >= 25 && bmi < 30) bmiLabel = 'Overweight';
      else if(bmi >= 30) bmiLabel = 'Obese';

      const activityMap = {Sedentary:0,'Lightly Active':9,'Moderately Active':17,'Very Active':25};
      const conditionMap = {'Slim / Underdeveloped':-2,'Average':4,'Sedentary / Weak':-9,'Overweight':0,'Already Training':16};
      const a = p.ability;
      const currentStats = {
        str: clampNum(12 + Math.round((a.pushup * 1.25 + a.squat * .28) / 2.1) + activityMap[p.activity] + conditionMap[p.condition] + (p.goal==='Build Muscle'?5:0), 8, 78),
        agi: clampNum(11 + Math.round(36 - a.runKmTime * 2.1) + activityMap[p.activity] + (p.goal==='Lose Weight'?5:0), 8, 78),
        vit: clampNum(14 + Math.round(a.plank / 6) + Math.round(a.situp / 5) + (p.sleep >= 7 ? 6 : 0), 8, 80),
        int: clampNum(12 + Math.round((p.sleep - 5) * 6) + Math.round((p.water - 1.5) * 5), 8, 80),
        per: clampNum(15 + Math.round((p.frequency - 2) * 5) + (p.motivation === 'Discipline' ? 10 : 4), 10, 88)
      };
      const avg = avgStat(currentStats);
      const basePot = clampNum(avg + 28, 62, 92);
      const potentialStats = {
        str: clampNum(basePot + (p.goal==='Build Muscle'?8:2), 68, 98),
        agi: clampNum(basePot + (p.goal==='Lose Weight'?8:1), 68, 96),
        vit: clampNum(basePot + 3, 70, 98),
        int: clampNum(basePot + (p.sleep >= 7 ? 6 : 2), 70, 98),
        per: clampNum(basePot + (p.motivation === 'Discipline' ? 10 : 4), 72, 99)
      };
      const goalCfg = {
        'Build Muscle': { protein:2.2, factor:1.15, className:'Fighter', protocol:'Ascension Strength Protocol' },
        'Lose Weight': { protein:2.0, factor:0.88, className:'Ranger', protocol:'Shadow Cut Protocol' },
        'Look Better': { protein:1.9, factor:1.0, className:'Knight', protocol:'Aesthetic Protocol' },
        'Stay In Shape': { protein:1.8, factor:1.0, className:'Monk', protocol:'Persistence Protocol' }
      }[p.goal];
      const ageFactor = p.gender === 'Male' ? 5 : -161;
      const bmr = 10 * p.weight + 6.25 * p.height - 5 * p.age + ageFactor;
      const actMult = {Sedentary:1.2,'Lightly Active':1.37,'Moderately Active':1.55,'Very Active':1.72}[p.activity];
      let cal = Math.round(bmr * actMult * goalCfg.factor);
      if(p.goal === 'Build Muscle') cal += 180;
      if(p.goal === 'Lose Weight') cal -= 220;
      const protein = Math.round(p.targetWeight * goalCfg.protein);
      const fat = Math.round((cal * 0.25) / 9);
      const carbs = Math.round((cal - protein * 4 - fat * 9) / 4);
      state.system = {
        ...state.system,
        className:goalCfg.className,
        protocolName:goalCfg.protocol,
        rank:'E', title:'Candidate', level:1, exp:0, coins:0, statPoints:0,
        currentStats, potentialStats,
        hp:{current:clampNum(74 + Math.round((p.sleep - 5) * 8), 42, 100), max:100},
        mp:{current:clampNum(68 + Math.round((p.water - 1.5) * 9), 38, 100), max:100},
        physiqueUse:avg, wastedPotential:100 - avg,
        bmi, bmiLabel,
        waterGoal:+Math.max(2.5, p.weight * 0.04).toFixed(1),
        calorieGoal:cal,
        macros:{protein, carbs, fat},
        weeklyWorkouts:p.frequency,
        estimated90DayWeight:p.goal==='Lose Weight' ? Math.max(p.targetWeight, p.weight - 6) : Math.min(p.targetWeight, p.weight + 5)
      };
      state.quests = generateQuests();
      state.history = [];
      state.proofs = [];
      state.logs = [{ time: nowStr(), type:'SYSTEM', text:`Protocol assigned: ${goalCfg.protocol}` }];
    }

    function generateQuests(){
      const p = state.profile;
      const s = state.system;
      const lvl = Math.max(1, s.level || 1);
      const a = p.ability;
      const band = lvl <= 5 ? 'FOUNDATION' : lvl <= 15 ? 'HUNTER' : lvl <= 30 ? 'ELITE' : 'MONARCH';
      const mult = 1 + ((lvl - 1) * 0.08);
      const deadline = endOfToday();
      const push = clampNum(Math.round(Math.max(12, a.pushup * (1.55 + mult))), 12, 420);
      const squat = clampNum(Math.round(Math.max(20, a.squat * (1.35 + mult))), 20, 520);
      const sit = clampNum(Math.round(Math.max(15, a.situp * (1.3 + mult))), 15, 400);
      const plank = clampNum(Math.round(Math.max(30, a.plank * (1.1 + lvl * 0.05))), 30, 900);
      const steps = clampNum((p.goal === 'Lose Weight' ? 9000 : p.goal === 'Build Muscle' ? 6500 : 7500) + (lvl * 120), 5500, 18000);
      const water = Math.round((s.waterGoal || 3) * 10);
      const sleep = Math.round(Math.max(7, p.sleep) * 10);
      const q = [];
      const add = obj => q.push({ id:uid(), progress:0, done:false, rewardClaimed:false, deadline, band, ...obj });
      add({ title:`[${band}] Strength Directive`, desc:`Selesaikan ${push} push-up total. Boleh dibagi ke beberapa set.`, type:'STR ORDER', statKey:'str', target:push, unit:'reps', value:`${push} reps`, proof:'Counter', rewardExp:90 + lvl * 18, rewardCoins:20 + lvl * 4 });
      add({ title:`[${band}] Lower Body Directive`, desc:`Selesaikan ${squat} squat total dengan form stabil.`, type:'VIT ORDER', statKey:'vit', target:squat, unit:'reps', value:`${squat} reps`, proof:'Counter', rewardExp:95 + lvl * 18, rewardCoins:20 + lvl * 4 });
      add({ title:`[${band}] Core Lock`, desc:`Tahan plank total ${plank} detik.`, type:'VIT ORDER', statKey:'vit', target:plank, unit:'sec', value:`${plank} sec`, proof:'Timer', rewardExp:90 + lvl * 16, rewardCoins:18 + lvl * 4 });
      add({ title:`[${band}] Mobility Order`, desc:`Capai ${fmt(steps)} langkah atau durasi jalan cepat yang setara.`, type:'AGI ORDER', statKey:'agi', target:steps, unit:'steps', value:`${fmt(steps)} steps`, proof:'Counter', rewardExp:85 + lvl * 16, rewardCoins:18 + lvl * 4 });
      add({ title:`[${band}] Recovery Compliance`, desc:`Penuhi hidrasi ${(water / 10).toFixed(1)} liter hari ini.`, type:'INT ORDER', statKey:'int', target:water, unit:'0.1L', displayUnit:'L', value:`${(water / 10).toFixed(1)} L`, proof:'Counter', rewardExp:70 + lvl * 12, rewardCoins:16 + lvl * 3 });
      add({ title:`[${band}] Sleep Protocol`, desc:`Targetkan tidur minimum ${(sleep / 10).toFixed(1)} jam.`, type:'PER ORDER', statKey:'per', target:sleep, unit:'0.1hr', displayUnit:'HR', value:`${(sleep / 10).toFixed(1)} hr`, proof:'Counter', rewardExp:75 + lvl * 12, rewardCoins:16 + lvl * 3 });
      if(lvl >= 3) add({ title:`[${band}] Core Ignition`, desc:`Selesaikan ${sit} sit-up / crunch total.`, type:'STR ORDER', statKey:'str', target:sit, unit:'reps', value:`${sit} reps`, proof:'Counter', rewardExp:82 + lvl * 15, rewardCoins:18 + lvl * 3 });
      if(s.className === 'Fighter') add({ title:`[${band}] Fighter Specialization`, desc:`Finisher strength: ${Math.max(10, Math.round(push * 0.45))} diamond / incline push-up.`, type:'CLASS ORDER', statKey:'str', target:Math.max(10, Math.round(push * 0.45)), unit:'reps', value:`${Math.max(10, Math.round(push * 0.45))} reps`, proof:'Counter', rewardExp:110 + lvl * 18, rewardCoins:26 + lvl * 4 });
      if(s.className === 'Ranger') add({ title:`[${band}] Ranger Specialization`, desc:`Tambahan ${fmt(Math.round(steps * 0.35))} langkah atau 12 menit cardio cepat.`, type:'CLASS ORDER', statKey:'agi', target:Math.round(steps * 0.35), unit:'steps', value:`${fmt(Math.round(steps * 0.35))} steps`, proof:'Counter', rewardExp:110 + lvl * 18, rewardCoins:26 + lvl * 4 });
      if(s.className === 'Knight') add({ title:`[${band}] Knight Specialization`, desc:`Wall sit atau static hold total ${Math.max(45, Math.round(plank * 0.6))} detik.`, type:'CLASS ORDER', statKey:'vit', target:Math.max(45, Math.round(plank * 0.6)), unit:'sec', value:`${Math.max(45, Math.round(plank * 0.6))} sec`, proof:'Timer', rewardExp:110 + lvl * 18, rewardCoins:26 + lvl * 4 });
      if(s.className === 'Monk') add({ title:`[${band}] Monk Specialization`, desc:`Ritual disiplin: 10 menit mobility, breathing, dan cooldown.`, type:'CLASS ORDER', statKey:'per', target:10, unit:'min', value:'10 min', proof:'Timer', rewardExp:110 + lvl * 18, rewardCoins:26 + lvl * 4 });
      return q;
    }

    function renderQuestCard(q, idx){
      const qp = questMeta(q);
      return `
        <div class="quest ${q.done?'done':''}">
          <div class="quest-head">
            <div>
              <h4>${escapeHtml(q.title)}</h4>
              <p>${escapeHtml(q.desc)}</p>
            </div>
            <div class="quest-pill">${escapeHtml(q.type)}</div>
          </div>
          <div class="grid two" style="margin-top:12px">
            <div class="mini"><div class="tiny">Target</div><div class="kpi-num" style="font-size:20px">${escapeHtml(q.value)}</div></div>

          </div>

    function renderCoreTab(){

    function attachDashboardEvents(){
      app.querySelectorAll('.open-progress').forEach(btn => btn.onclick = () => openProgressModal(Number(btn.dataset.index)));
      app.querySelectorAll('.open-proof').forEach(btn => btn.onclick = () => openProofStation(Number(btn.dataset.index)));

      const alloc2 = document.getElementById('allocBtn2'); if(alloc2) alloc2.onclick = openAllocationModal;
      const judgement = document.getElementById('judgementBtn'); if(judgement) judgement.onclick = () => showSystemMessage('SYSTEM JUDGEMENT', localSystemMessage());
      const recalc = document.getElementById('recalcBtn'); if(recalc) recalc.onclick = () => { calculateSystem(); saveState(); renderDashboard(); toast('Protocol dikalibrasi ulang.'); };
      const edit = document.getElementById('editAssessmentBtn'); if(edit) edit.onclick = () => { state.onboardingDone = false; state.assessmentStep = 0; saveState(); render(); };
      const reset = document.getElementById('resetBtn'); if(reset) reset.onclick = confirmReset;
    }

    function openProgressModal(index){
      const q = state.quests[index];
      if(!q) return;
      const meta = questMeta(q);
      modalRoot.innerHTML = `
        <div class="modal">
          <div class="modal-card card">
            <h3>${escapeHtml(q.title)}</h3>
            <p class="small">Target ${escapeHtml(q.value)} · Progress saat ini ${formatProgress(q)}</p>
            <div class="progress" style="margin-top:12px"><span style="width:${meta.pct}%"></span></div>
            <div class="field" style="margin-top:16px"><label>Tambah progress</label><input class="input" id="progInput" type="number" min="0" placeholder="0" /></div>
            <div class="grid two" style="margin-top:12px">
              <button class="btn secondary quickAdd" data-add="1">+1</button>
              <button class="btn secondary quickAdd" data-add="5">+5</button>
              <button class="btn secondary quickAdd" data-add="10">+10</button>
              <button class="btn secondary quickAdd" data-add="25">+25</button>
            </div>
            <div class="stack" style="margin-top:16px">
              <button class="btn" id="saveProgBtn">Save Progress</button>
              <button class="btn ghost" id="cancelProgBtn">Cancel</button>
            </div>
          </div>
        </div>`;
      const input = document.getElementById('progInput');
      modalRoot.querySelectorAll('.quickAdd').forEach(btn => btn.onclick = () => { input.value = Number(input.value || 0) + Number(btn.dataset.add); });
      document.getElementById('cancelProgBtn').onclick = closeModal;
      document.getElementById('saveProgBtn').onclick = () => {
        const add = Math.max(0, Number(input.value || 0));
        q.progress = Math.min(q.target, (q.progress || 0) + add);
        const wasDone = q.done;
        q.done = q.progress >= q.target;
        let levelUp = false;
        if(q.done && !wasDone){ levelUp = awardQuest(q); }
        state.logs.unshift({ time:nowStr(), type:q.done ? 'QUEST CLEAR' : 'PROGRESS', text:`${q.title}: ${q.progress}/${q.target}` });
        saveState();
        closeModal();
        renderDashboard();
        showSystemMessage(q.done ? 'QUEST CLEAR' : 'PROGRESS RECORDED', q.done
          ? `PLAYER: ${state.profile.name || 'Unknown'}\nJUDGEMENT: ${q.title} mencapai ${formatProgress(q)}. Order diakui selesai.\nREWARD: +${q.rewardExp} EXP dan +${q.rewardCoins} Coins.${levelUp ? ' Level meningkat.' : ''}`
          : `PLAYER: ${state.profile.name || 'Unknown'}\nJUDGEMENT: Progress ${q.title} tercatat ${formatProgress(q)}.\nORDER: Selesaikan sisa ${Math.max(0, q.target - q.progress)} ${q.unit || ''}.`
        );
      };
    }

    function openProofStation(index){
      const q = state.quests[index];
      if(!q) return;
      if(String(q.proof).toLowerCase().includes('timer')) return openTimerOverlay(index);
      return openProgressModal(index);
    }

    function openTimerOverlay(index){
      const q = state.quests[index];
      const remain = Math.max(0, q.target - q.progress);
      let current = remain;
      let timer = null;
      overlayRoot.innerHTML = `
        <div class="holo">
          <div class="holo-card">
            <div class="holo-head"><div class="holo-title"><span class="orb"></span><span>TIMER STATION</span></div><div class="pill">${escapeHtml(q.unit || 'sec')}</div></div>
            <div class="small">${escapeHtml(q.title)}</div>
            <div class="big-read" id="timerRead">${current}</div>
            <div class="small" style="text-align:center">Remaining target to clear ${remain} ${escapeHtml(q.unit || '')}</div>
            <div class="footer-actions"><button class="btn" id="timerStart">START</button><button class="btn secondary" id="timerAdd">+10 SEC</button></div>
            <div class="stack" style="margin-top:10px"><button class="btn secondary" id="timerStop">STOP & SAVE</button><button class="btn ghost" id="timerCancel">CANCEL</button></div>
          </div>
        </div>`;
      const read = document.getElementById('timerRead');
      document.getElementById('timerStart').onclick = () => {
        if(timer) return;
        timer = setInterval(() => {
          if(current <= 0){
            clearInterval(timer); timer = null;
            q.progress = q.target; q.done = true;
            const levelUp = awardQuest(q);
            state.logs.unshift({ time:nowStr(), type:'QUEST CLEAR', text:`${q.title}: timer complete` });
            saveState(); closeOverlay(); renderDashboard();
            showSystemMessage('QUEST CLEAR', `PLAYER: ${state.profile.name || 'Unknown'}\nJUDGEMENT: Timer proof untuk ${q.title} selesai.\nREWARD: +${q.rewardExp} EXP dan +${q.rewardCoins} Coins.${levelUp ? ' Level meningkat.' : ''}`);
            return;
          }
          current -= 1; read.textContent = current;
        }, 1000);
      };
      document.getElementById('timerAdd').onclick = () => { current += 10; read.textContent = current; };
      document.getElementById('timerStop').onclick = () => {
        if(timer) clearInterval(timer);
        const elapsed = Math.max(0, remain - current);
        q.progress = Math.min(q.target, q.progress + elapsed);
        const wasDone = q.done;
        q.done = q.progress >= q.target;
        let levelUp = false;
        if(q.done && !wasDone) levelUp = awardQuest(q);
        state.logs.unshift({ time:nowStr(), type:q.done ? 'QUEST CLEAR' : 'PROGRESS', text:`${q.title}: ${q.progress}/${q.target}` });
        saveState(); closeOverlay(); renderDashboard();
        showSystemMessage(q.done ? 'QUEST CLEAR' : 'PROGRESS RECORDED', q.done
          ? `PLAYER: ${state.profile.name || 'Unknown'}\nJUDGEMENT: Timer progress untuk ${q.title} lengkap.\nREWARD: +${q.rewardExp} EXP dan +${q.rewardCoins} Coins.${levelUp ? ' Level meningkat.' : ''}`
          : `PLAYER: ${state.profile.name || 'Unknown'}\nJUDGEMENT: Timer progress ${q.title} tercatat ${formatProgress(q)}.\nORDER: Sisa ${Math.max(0, q.target - q.progress)} ${q.unit || ''}.`);
      };
      document.getElementById('timerCancel').onclick = () => { if(timer) clearInterval(timer); closeOverlay(); };
    }

    function uploadProof(index){
      const q = state.quests[index];
      if(!q) return;
      const input = document.createElement('input');
      input.type = 'file'; input.accept = 'image/*';
      input.onchange = () => {
        const file = input.files && input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          state.proofs.unshift({ questId:q.id, questTitle:q.title, note:'Visual proof uploaded', image:reader.result, time:nowStr() });
          saveState(); renderDashboard(); toast('Proof tersimpan lokal.');
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }

    function openAllocationModal(){
      if(state.system.statPoints <= 0) return toast('Belum ada stat points.');
      const stats = ['str','agi','vit','int','per'];
      modalRoot.innerHTML = `
        <div class="modal">
          <div class="modal-card card">
            <h3>Allocate Stat Points</h3>
            <p class="small">Sisa point <b id="pointLeft">${state.system.statPoints}</b>. Distribusikan sesuai build yang kamu inginkan.</p>
            <div class="list" style="margin-top:14px">
              ${stats.map(key => `<button class="btn secondary stat-add" data-key="${key}">${key.toUpperCase()} +1 <span style="margin-left:8px">(${state.system.currentStats[key]})</span></button>`).join('')}
            </div>
            <div class="stack" style="margin-top:16px"><button class="btn" id="doneAlloc">Selesai</button></div>
          </div>
        </div>`;
      modalRoot.querySelectorAll('.stat-add').forEach(btn => btn.onclick = () => {
        if(state.system.statPoints <= 0) return;
        const key = btn.dataset.key;
        state.system.currentStats[key] += 1;
        state.system.statPoints -= 1;
        saveState();
        openAllocationModal();
        renderDashboard();
      });
      document.getElementById('doneAlloc').onclick = () => { closeModal(); renderDashboard(); };
    }

    function awardQuest(q){
      if(q.rewardClaimed) return false;
      q.rewardClaimed = true;
      const before = state.system.level;
      state.system.exp += q.rewardExp;
      state.system.coins += q.rewardCoins;
      if(q.statKey && state.system.currentStats[q.statKey] != null) state.system.currentStats[q.statKey] += 1;
      applyLevelProgress();
      return state.system.level > before;
    }

    function applyLevelProgress(){
      const before = state.system.level;
      state.system.level = levelFromExp(state.system.exp);
      state.system.rank = rankFromLevel(state.system.level);
      state.system.title = currentTitle();
      if(state.system.level > before){
        state.system.statPoints += (state.system.level - before) * 3;
        showSystemMessage('LEVEL UP', `PLAYER: ${state.profile.name || 'Unknown'}\nJUDGEMENT: Level meningkat dari ${before} ke ${state.system.level}.\nREWARD: +${(state.system.level - before) * 3} stat points. Buka STATUS atau CORE untuk distribusi point.`);
      }
    }

    function maybeRolloverDay(){
      const today = todayKey();
      if(!state.daily.date){ state.daily.date = today; return; }
      if(state.daily.date === today) return;
      const done = state.quests.filter(q => q.done).length;
      const total = state.quests.length || 1;
      const ok = done / total >= 0.6;
      state.history.unshift({ date:state.daily.date, done, total, penalty:!ok });
      state.history = state.history.slice(0, 60);
      state.daily.streak = ok ? state.daily.streak + 1 : 0;
      state.daily.bestStreak = Math.max(state.daily.bestStreak, state.daily.streak);
      if(done === total && total > 0){
        state.system.exp += 500;
        state.system.coins += 80;
        applyLevelProgress();
      }
      state.quests = generateQuests();
      state.daily.date = today;
      saveState();
    }

    function localSystemMessage(){
      const done = state.quests.filter(q => q.done).length;
      const total = state.quests.length || 1;
      const pct = Math.round(done / total * 100);
      const name = (state.profile.name || 'PLAYER').toUpperCase();
      if(pct < 35) return `PLAYER: ${name}\nJUDGEMENT: Performamu lemah. Completion rate baru ${pct}%. SYSTEM tidak mengakui potensi yang tidak dieksekusi.\nORDER: Masuk ke ORDER dan clear minimal satu quest sekarang.`;
      if(pct < 70) return `PLAYER: ${name}\nJUDGEMENT: Progres parsial terdeteksi, tetapi belum memadai. ${pct}% tidak cukup untuk disebut dominan.\nORDER: Lanjutkan quest yang tersisa dan amankan EXP.`;
      return `PLAYER: ${name}\nJUDGEMENT: Kinerja dapat diterima. ${pct}% order telah dipenuhi.\nORDER: Jangan berhenti sebelum semua hadiah dan EXP hari ini diamankan.`;
    }

    function showSystemMessage(title, message){
      overlayRoot.innerHTML = `
        <div class="holo">
          <div class="holo-card">
            <div class="holo-head"><div class="holo-title"><span class="orb"></span><span>${escapeHtml(title)}</span></div><div class="pill">RANK ${state.system.rank}</div></div>
            <div class="holo-body" id="holoText"></div>
            <div class="stack" style="margin-top:14px"><button class="btn" id="closeHolo">ACCEPT</button></div>
          </div>
        </div>`;
      typeWriter(document.getElementById('holoText'), message);
      document.getElementById('closeHolo').onclick = closeOverlay;
    }

    function confirmReset(){
      modalRoot.innerHTML = `
        <div class="modal">
          <div class="modal-card card">
            <h3>Reset SYSTEM?</h3>
            <p class="small">Semua quest, rank, level, proof, dan history akan dihapus dari device ini.</p>
            <div class="footer-actions"><button class="btn" id="confirmResetBtn">Ya, reset</button><button class="btn secondary" id="cancelResetBtn">Batal</button></div>
          </div>
        </div>`;
      document.getElementById('cancelResetBtn').onclick = closeModal;
      document.getElementById('confirmResetBtn').onclick = () => {
        localStorage.removeItem(STORAGE_KEY);
        state = JSON.parse(JSON.stringify(defaultState));
        closeModal(); closeOverlay(); render();
      };
    }

    function questMeta(q){
      const pct = Math.min(100, Math.round((q.progress || 0) / Math.max(q.target || 1, 1) * 100));
      return { pct, countdown:formatDuration((q.deadline || 0) - Date.now()) };
    }
    function formatProgress(q){
      if(q.displayUnit === 'L') return `${((q.progress || 0) / 10).toFixed(1)}/${(q.target / 10).toFixed(1)} L`;
      if(q.displayUnit === 'HR') return `${((q.progress || 0) / 10).toFixed(1)}/${(q.target / 10).toFixed(1)} hr`;
      return `${q.progress || 0}/${q.target} ${q.unit || ''}`;
    }
    function statLine(label, current, potential){
      const pct = Math.min(100, Math.round(current / Math.max(potential, 1) * 100));
      return `<div class="stat-line"><div class="stat-row"><b>${label}</b><span>${current} / ${potential}</span></div><div class="progress" style="margin-top:8px"><span style="width:${pct}%"></span></div></div>`;
    }
    function expProgress(){
      const level = state.system.level || 1;
      const exp = state.system.exp || 0;
      const base = EXP_TABLE[Math.max(0, level - 1)] || 0;
      const next = EXP_TABLE[level] || (base + 6000);
      const current = exp - base;
      const need = next - base;
      return { current, need, pct:Math.max(0, Math.min(100, Math.round(current / need * 100))) };
    }
    function currentTitle(){
      const lvl = state.system.level || 1;
      if(state.system.rank === 'S') return 'Shadow Monarch';
      if(lvl >= 10) return 'Awakened';
      if(state.daily.streak >= 7) return 'The Persistent';
      if(lvl >= 5) return 'The First Step';
      return state.system.title || 'Candidate';
    }
    function rankFromLevel(level){ if(level >= 76) return 'S'; if(level >= 51) return 'A'; if(level >= 31) return 'B'; if(level >= 16) return 'C'; if(level >= 6) return 'D'; return 'E'; }
    function levelFromExp(exp){ let lvl = 1; for(let i=1;i<EXP_TABLE.length;i++){ if(exp >= EXP_TABLE[i]) lvl = i + 1; else break; } return lvl; }
    function avgStat(stats){ const vals = Object.values(stats).map(Number); return Math.round(vals.reduce((a,b) => a + b, 0) / vals.length); }
    function updateCountdowns(){ document.querySelectorAll('[data-countdown]').forEach(el => { el.textContent = formatDuration(Number(el.dataset.countdown || 0) - Date.now()); }); }
    function readAvatar(file){ const reader = new FileReader(); reader.onload = () => { state.profile.avatarData = String(reader.result || ''); saveState(); }; reader.readAsDataURL(file); }
    function loadState(){ try{ return Object.assign({}, JSON.parse(JSON.stringify(defaultState)), JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}')); }catch{ return JSON.parse(JSON.stringify(defaultState)); } }
    function migrateState(){
      const base = JSON.parse(JSON.stringify(defaultState));
      state = deepMerge(base, state || {});
      if(!Array.isArray(state.profile.focus)) state.profile.focus = ['Full Body'];
      if(!state.daily.date && state.onboardingDone) state.daily.date = todayKey();
      state.system.level = levelFromExp(state.system.exp || 0);
      state.system.rank = rankFromLevel(state.system.level || 1);
      state.system.title = currentTitle();
    }
    function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); setTimeout(() => attachDashboardEvents(), 0); }
    function deepMerge(target, source){
      if(typeof source !== 'object' || source === null) return target;
      for(const key of Object.keys(source)){
        const sv = source[key], tv = target[key];
        if(Array.isArray(sv)) target[key] = sv;
        else if(sv && typeof sv === 'object') target[key] = deepMerge(tv && typeof tv === 'object' ? tv : {}, sv);
        else target[key] = sv;
      }
      return target;
    }
    function todayKey(){ return new Date().toISOString().slice(0,10); }
    function endOfToday(){ const d = new Date(); d.setHours(23,59,59,999); return d.getTime(); }
    function formatDuration(ms){ if(ms <= 0) return 'Expired'; const total = Math.floor(ms / 1000); const h = Math.floor(total / 3600); const m = Math.floor((total % 3600) / 60); const s = total % 60; return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }
    function fmt(n){ return new Intl.NumberFormat('id-ID').format(n); }
    function clampNum(n, min, max){ return Math.max(min, Math.min(max, n)); }
    function escapeHtml(str){ return String(str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function uid(){ return Math.random().toString(36).slice(2,10); }
    function nowStr(){ return new Date().toLocaleString('id-ID'); }
    function toast(msg){
      const el = document.createElement('div');
      el.textContent = msg;
      el.style.cssText = 'position:fixed;left:50%;transform:translateX(-50%);bottom:108px;background:rgba(7,16,30,.95);color:#eef7ff;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.1);z-index:80;box-shadow:0 12px 24px rgba(0,0,0,.35);font-size:13px;max-width:calc(100% - 32px);text-align:center';
      document.body.appendChild(el);
      setTimeout(() => { el.remove(); }, 1800);
    }
    function typeWriter(node, text){ let i = 0; clearInterval(typeWriter.t); typeWriter.t = setInterval(() => { node.textContent = text.slice(0, i++); if(i > text.length) clearInterval(typeWriter.t); }, 6); }
    function showNav(){ bottomNav.classList.remove('hidden'); }
    function hideNav(){ bottomNav.classList.add('hidden'); fab.classList.add('hidden'); }
    function closeModal(){ modalRoot.innerHTML = ''; }
    function closeOverlay(){ overlayRoot.innerHTML = ''; }
    function navIcon(tab){ return ({status:'◉',orders:'◎',proof:'▣',analysis:'◇',core:'✦'})[tab] || '•'; }
  </script>
</body>
