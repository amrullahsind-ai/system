<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>SYSTEM — Living Body Protocol</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="theme-color" content="#071323" />
</head>
<body>
  <div id="boot" class="boot">
    <div class="boot-box">
      <div class="scanline"></div>
      <h1>[SYSTEM ONLINE]</h1>
      <p id="bootText">Player terdeteksi. Evaluasi tubuh diperlukan.</p>
      <button id="enterBtn" class="primary">BUKA STATUS WINDOW</button>
    </div>
  </div>

  <div class="app-shell hidden" id="app">
    <header class="topbar">
      <div>
        <span class="eyebrow">SYSTEM v5</span>
        <h1>Living Body Protocol</h1>
      </div>
      <button id="installBtn" class="ghost small hidden">INSTALL</button>
    </header>

    <main id="view"></main>

    <nav class="nav">
      <button data-tab="status" class="active">STATUS</button>
      <button data-tab="order">ORDER</button>
      <button data-tab="proof">PROOF</button>
      <button data-tab="gate">GATE</button>
      <button data-tab="core">CORE</button>
    </nav>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-title" id="modalTitle">[SYSTEM TRANSMISSION]</div>
      <div class="modal-body" id="modalBody"></div>
      <button id="modalClose" class="primary">TERIMA</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
