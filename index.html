<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020814" />
  <title>ARISE SYSTEM — Living Protocol</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#030817;
      --bg-2:#08182d;
      --panel:rgba(13,27,49,.82);
      --panel-2:rgba(7,17,33,.78);
      --border:rgba(136,196,255,.18);
      --line:rgba(122,192,255,.15);
      --text:#f5fbff;
      --muted:#9ab2c9;
      --blue:#5eb5ff;
      --blue-2:#2190ff;
      --cyan:#75fbff;
      --green:#68ffae;
      --amber:#ffcf67;
      --red:#ff5577;
      --shadow:0 20px 70px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
      --radius:28px;
      --radius-sm:20px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;background:radial-gradient(circle at 50% -10%, rgba(62,125,255,.28), transparent 28%), radial-gradient(circle at 15% 30%, rgba(58,171,255,.18), transparent 25%), linear-gradient(180deg,#02050d 0%, #051122 55%, #030817 100%); color:var(--text); font-family:Inter,system-ui,sans-serif; overflow:hidden}
    body::before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(180deg, rgba(255,255,255,.026) 0 1px, transparent 1px 6px);mix-blend-mode:soft-light;pointer-events:none;opacity:.45;animation:scan 14s linear infinite}
    body::after{content:"";position:fixed;inset:0;background:radial-gradient(circle at center, transparent 62%, rgba(0,0,0,.35));pointer-events:none}
    @keyframes scan{from{transform:translateY(0)}to{transform:translateY(20px)}}
    .noise,.aura{position:fixed;inset:0;pointer-events:none}
    .noise{opacity:.08;background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="1.1" numOctaves="4" stitchTiles="stitch"/></filter><rect width="120" height="120" filter="url(%23n)" opacity="0.6"/></svg>');mix-blend-mode:screen}
    .aura{background:radial-gradient(circle at 50% 18%, rgba(78,187,255,.20), transparent 23%), radial-gradient(circle at 50% 65%, rgba(59,110,255,.13), transparent 35%); animation:pulse 8s ease-in-out infinite}
    @keyframes pulse{50%{transform:scale(1.02);opacity:.85}}

    .app{position:relative;height:100%;display:flex;justify-content:center;overflow:hidden}
    .phone-shell{position:relative;width:min(100vw,460px);height:100%;border-inline:1px solid rgba(255,255,255,.04);background:linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,0));backdrop-filter:blur(6px);overflow:hidden}
    .top-glow{position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:280px;height:280px;border-radius:50%;background:radial-gradient(circle, rgba(116,245,255,.28), rgba(73,120,255,.12) 45%, transparent 70%);filter:blur(24px);opacity:.9;pointer-events:none}

    .screen{position:absolute;inset:0;overflow:auto;padding:calc(18px + var(--safe-top)) 18px calc(112px + var(--safe-bottom));opacity:0;transform:translateY(18px) scale(.985);transition:opacity .45s ease, transform .45s ease}
    .screen.active{opacity:1;transform:translateY(0) scale(1)}
    .screen::-webkit-scrollbar{width:0;height:0}
    .center-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%}

    .brand-mark{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:28px;margin-bottom:24px}
    .logo-glyph{width:38px;height:38px;position:relative;filter:drop-shadow(0 0 12px rgba(101,196,255,.28))}
    .logo-glyph::before,.logo-glyph::after{content:"";position:absolute;background:linear-gradient(180deg,#e9f8ff,#86bcff)}
    .logo-glyph::before{inset:3px 14px 3px 14px;clip-path:polygon(50% 0, 100% 18%, 65% 50%, 100% 82%, 50% 100%, 0 82%, 35% 50%, 0 18%)}
    .logo-glyph::after{inset:0;clip-path:polygon(50% 0, 100% 18%, 66% 50%, 100% 82%, 50% 100%, 0 82%, 34% 50%, 0 18%);opacity:.18;filter:blur(8px)}
    .brand-title{font-family:Cinzel,serif;font-size:56px;letter-spacing:.03em;text-shadow:0 12px 28px rgba(0,0,0,.35),0 0 18px rgba(114,183,255,.18)}
    .brand-sub{font-size:18px;color:var(--muted);text-align:center;max-width:290px;line-height:1.45}

    .silhouette-wrap{position:relative;width:250px;height:300px;margin:16px auto 34px}
    .silhouette-wrap::before{content:"";position:absolute;inset:10px 40px 22px;border-radius:50%;background:radial-gradient(circle at 50% 35%, rgba(110,223,255,.34), rgba(48,102,230,.10) 45%, transparent 72%);filter:blur(18px)}
    .silhouette{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:148px;height:260px;border-radius:80px 80px 44px 44px/90px 90px 40px 40px;background:linear-gradient(180deg, rgba(122,255,244,.78), rgba(35,100,149,.26));filter:blur(10px);opacity:.88;clip-path:polygon(38% 0, 62% 0, 76% 14%, 82% 29%, 79% 46%, 70% 56%, 69% 77%, 75% 100%, 61% 100%, 55% 76%, 45% 76%, 39% 100%, 25% 100%, 31% 77%, 30% 56%, 21% 46%, 18% 29%, 24% 14%) }
    .ring{position:absolute;border:1px solid rgba(125,200,255,.22);border-radius:50%;animation:spin 16s linear infinite}
    .ring.one{inset:12px 25px 52px}
    .ring.two{inset:40px 0 20px;animation-direction:reverse;animation-duration:22s}
    .ring.three{inset:72px 46px 0;animation-duration:13s}
    .ring::before,.ring::after{content:"";position:absolute;width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 18px rgba(117,251,255,.95)}
    .ring::before{top:-4px;left:50%}.ring::after{bottom:22%;right:-2px}
    @keyframes spin{to{transform:rotate(360deg)}}

    .hero-card,.panel,.question-card,.metric-card,.quest-card,.plan-card,.mini-card{background:linear-gradient(180deg, rgba(15,28,50,.92), rgba(7,17,31,.86));border:1px solid var(--border);box-shadow:var(--shadow);border-radius:var(--radius);}
    .hero-card{padding:22px 20px;position:relative;overflow:hidden}
    .hero-card::before,.panel::before,.question-card::before,.metric-card::before,.quest-card::before,.plan-card::before,.mini-card::before{content:"";position:absolute;inset:0;background:linear-gradient(130deg, rgba(255,255,255,.04), transparent 30%, transparent 70%, rgba(98,189,255,.05));pointer-events:none}
    .hero-card h1{font-size:42px;line-height:1.02;margin:0 0 10px;font-weight:800;letter-spacing:-.03em}
    .hero-card p{margin:0;color:var(--muted);font-size:15px;line-height:1.55}
    .hero-card .glow-line{height:2px;background:linear-gradient(90deg, transparent, rgba(117,251,255,.9), transparent);margin:18px 0;box-shadow:0 0 20px rgba(117,251,255,.6)}

    .btn{border:none;outline:none;cursor:pointer;border-radius:22px;padding:17px 18px;font-size:18px;font-weight:800;color:#04111f;background:linear-gradient(90deg,#69b9ff,#b4e2ff);box-shadow:0 16px 30px rgba(56,135,255,.28);width:100%;transition:transform .18s ease, filter .18s ease, opacity .18s ease}
    .btn:hover{filter:brightness(1.02)}
    .btn:active{transform:scale(.985)}
    .btn.secondary{background:rgba(255,255,255,.05);color:var(--text);border:1px solid rgba(255,255,255,.12);box-shadow:none}
    .btn.ghost{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,.08);box-shadow:none}
    .btn.hold{position:relative;overflow:hidden}
    .btn.hold span{position:relative;z-index:2}
    .btn.hold::before{content:"";position:absolute;left:0;top:0;bottom:0;width:var(--hold, 0%);background:linear-gradient(90deg,#68b5ff,#78fff7);transition:width .06s linear}

    .cta-stack{display:flex;gap:12px;flex-direction:column;width:100%;margin-top:28px}
    .small-note{color:#7f95ac;font-size:13px;text-align:center;line-height:1.45;margin-top:12px}
    .warning-ticker{display:flex;align-items:center;gap:10px;background:rgba(255,84,119,.10);border:1px solid rgba(255,96,133,.18);color:#ffdce6;padding:12px 14px;border-radius:16px;font-size:13px;margin-top:12px}
    .warning-dot{width:10px;height:10px;border-radius:50%;background:var(--red);box-shadow:0 0 18px rgba(255,85,119,.9)}

    .system-header{display:flex;align-items:center;justify-content:space-between;margin:4px 0 12px}
    .back-btn,.icon-btn{width:42px;height:42px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);display:grid;place-items:center;color:var(--text)}
    .progress-shell{height:8px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin:8px 0 18px;border:1px solid rgba(255,255,255,.06)}
    .progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#56a7ff,#8ff8ff);box-shadow:0 0 20px rgba(96,186,255,.52);transition:width .35s ease;width:0}

    .question-card{padding:22px 18px 18px;position:relative}
    .question-title{font-size:34px;line-height:1.12;font-weight:800;letter-spacing:-.03em;margin:0 0 10px}
    .question-sub{margin:0 0 18px;color:var(--muted);font-size:14px;line-height:1.5}
    .grid{display:grid;gap:12px}
    .grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .option{position:relative;padding:16px 14px;border-radius:20px;border:1px solid rgba(120,190,255,.14);background:rgba(8,19,36,.72);color:var(--text);min-height:74px;display:flex;flex-direction:column;justify-content:center;gap:4px;transition:transform .18s ease,border-color .18s ease, background .18s ease, box-shadow .18s ease;cursor:pointer}
    .option:hover{transform:translateY(-1px);border-color:rgba(120,190,255,.24)}
    .option.selected{border-color:rgba(107,255,180,.48);background:linear-gradient(180deg, rgba(15,74,53,.72), rgba(10,29,34,.9));box-shadow:0 0 0 1px rgba(107,255,180,.18), 0 12px 28px rgba(8,33,26,.38)}
    .option .label{font-weight:700;font-size:18px}
    .option .desc{font-size:12px;color:var(--muted)}
    .checkmark{position:absolute;right:12px;top:12px;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);font-size:12px}
    .selected .checkmark{background:rgba(104,255,174,.18);border-color:rgba(104,255,174,.36)}

    .field{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
    .field label{font-size:13px;color:var(--muted);font-weight:600}
    .input,.select, .range-shell{width:100%;border-radius:18px;background:rgba(6,15,28,.82);border:1px solid rgba(131,190,255,.14);color:var(--text);padding:18px 16px;font-size:20px;font-weight:700;outline:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
    .input::placeholder{color:#6b8197}
    .stack{display:flex;flex-direction:column;gap:12px}
    .dual{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    .slider-shell{padding:10px 0 4px}
    input[type="range"]{width:100%;appearance:none;background:transparent}
    input[type="range"]::-webkit-slider-runnable-track{height:10px;border-radius:999px;background:linear-gradient(90deg, rgba(75,156,255,.75), rgba(117,251,255,.8));box-shadow:inset 0 0 0 100vmax rgba(255,255,255,.02)}
    input[type="range"]::-moz-range-track{height:10px;border-radius:999px;background:linear-gradient(90deg, rgba(75,156,255,.75), rgba(117,251,255,.8))}
    input[type="range"]::-webkit-slider-thumb{appearance:none;width:28px;height:28px;border-radius:50%;background:white;border:4px solid #69b9ff;box-shadow:0 0 0 6px rgba(105,185,255,.18);margin-top:-9px}
    input[type="range"]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:white;border:4px solid #69b9ff}
    .value-pill{display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-weight:800;font-size:14px}

    .analysis-wrap{display:flex;flex-direction:column;gap:14px}
    .analysis-card{padding:18px;position:relative;overflow:hidden}
    .analysis-value{font-family:Orbitron,Inter,sans-serif;font-size:56px;font-weight:800;letter-spacing:-.03em;margin:0}
    .muted{color:var(--muted)}
    .status-list{display:grid;gap:12px;margin-top:12px}
    .status-item{display:flex;align-items:center;justify-content:space-between;padding:14px 14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
    .status-left{display:flex;flex-direction:column;gap:4px}.status-left b{font-size:15px}.status-left span{font-size:12px;color:var(--muted)}
    .status-dot{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
    .status-dot.active{background:rgba(104,255,174,.18);border-color:rgba(104,255,174,.3);box-shadow:0 0 20px rgba(104,255,174,.25)}

    .dashboard{display:grid;gap:14px}
    .identity{display:flex;align-items:center;justify-content:space-between;gap:14px}
    .avatar-core{position:relative;width:72px;height:72px;border-radius:22px;background:linear-gradient(180deg, rgba(89,187,255,.18), rgba(27,43,80,.72));border:1px solid rgba(116,212,255,.22);display:grid;place-items:center;overflow:hidden}
    .avatar-core::before{content:"";position:absolute;width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at center, rgba(145,255,255,.72), rgba(66,111,255,.18) 55%, transparent 70%);filter:blur(4px)}
    .avatar-core svg{position:relative;z-index:2;opacity:.86}
    .identity h2{margin:0;font-size:28px;line-height:1.05}.identity p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .rank-badge{padding:12px 14px;border-radius:18px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);text-align:right;min-width:90px}
    .rank-badge b{display:block;font-size:20px;font-family:Orbitron,Inter,sans-serif}
    .rank-badge span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}

    .stats-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .metric-card{padding:18px;position:relative;overflow:hidden}
    .metric-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
    .metric-top h4{margin:0;font-size:16px;font-weight:600;color:#dce9f8}
    .metric-top b{font-size:18px;font-family:Orbitron,Inter,sans-serif}
    .bar{height:14px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid rgba(255,255,255,.05)}
    .bar > span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#48a1ff,#72ffd5);box-shadow:0 0 18px rgba(82,206,255,.4);width:0;transition:width .9s cubic-bezier(.2,.7,0,1)}
    .bar.red > span{background:linear-gradient(90deg,#ff5c7d,#ffa85e)}

    .section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin:6px 0 2px}
    .section-head h3{font-size:22px;margin:0}.section-head span{color:var(--muted);font-size:13px}
    .quest-list,.plan-list,.mini-list{display:grid;gap:12px}
    .quest-card,.plan-card,.mini-card{padding:16px 16px 14px;position:relative;overflow:hidden}
    .quest-card.done{border-color:rgba(104,255,174,.26)}
    .quest-title{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .quest-title h4,.plan-card h4,.mini-card h4{margin:0;font-size:18px}
    .quest-title p,.plan-card p,.mini-card p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.5}
    .quest-pill{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.05)}
    .quest-actions{display:flex;gap:10px;margin-top:14px}.quest-actions .btn{padding:12px 14px;font-size:14px;border-radius:16px}.quest-actions .btn.secondary{padding-inline:12px}
    .tiny{font-size:12px;color:var(--muted)}

    .comparison{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .compare-box{padding:18px;border-radius:22px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
    .compare-box h4{margin:0 0 10px;font-size:16px;color:#dce9f8}.compare-box .big{font-family:Orbitron,Inter,sans-serif;font-size:36px;margin:0 0 4px;font-weight:800}
    .chart{position:relative;height:180px;border-radius:22px;border:1px solid rgba(255,255,255,.06);background:linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.02));overflow:hidden;padding:20px}
    .chart::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(180deg, transparent 0 34px, rgba(255,255,255,.06) 34px 35px)}
    .chart svg{position:relative;z-index:2;width:100%;height:100%}

    .bottom-nav{position:absolute;left:16px;right:16px;bottom:calc(18px + var(--safe-bottom));padding:10px;border-radius:28px;background:rgba(5,13,26,.88);border:1px solid rgba(255,255,255,.08);box-shadow:0 18px 40px rgba(0,0,0,.35);display:none;grid-template-columns:repeat(5,1fr);gap:6px;backdrop-filter:blur(14px)}
    .bottom-nav.show{display:grid}
    .nav-btn{display:flex;flex-direction:column;align-items:center;gap:6px;border:none;background:transparent;color:#7f93aa;padding:10px 4px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer}
    .nav-btn.active{background:linear-gradient(180deg, rgba(89,178,255,.18), rgba(64,116,255,.08));color:white}
    .nav-btn svg{width:18px;height:18px}

    .fab{position:absolute;right:20px;bottom:120px;width:58px;height:58px;border-radius:20px;background:linear-gradient(180deg,#7dd0ff,#4ea5ff);display:none;place-items:center;box-shadow:0 16px 34px rgba(60,130,255,.42);border:none;color:#03111e;cursor:pointer;font-weight:900;font-size:26px}
    .fab.show{display:grid}

    .toast{position:absolute;left:50%;bottom:110px;transform:translateX(-50%) translateY(16px);min-width:230px;max-width:86%;padding:14px 16px;border-radius:18px;background:rgba(5,15,29,.95);border:1px solid rgba(106,198,255,.18);box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:all .3s ease;font-size:14px;color:#e8f6ff}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    .modal{position:absolute;inset:0;background:rgba(2,6,12,.68);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px;z-index:12}
    .modal.show{display:flex}
    .modal-card{width:100%;max-width:380px;padding:22px;border-radius:28px;background:linear-gradient(180deg, rgba(10,24,45,.96), rgba(5,14,28,.98));border:1px solid rgba(120,200,255,.22);box-shadow:0 26px 80px rgba(0,0,0,.45)}
    .modal-card h3{margin:0 0 8px;font-size:28px}.modal-card p{margin:0;color:var(--muted);line-height:1.55}.modal-card .btn{margin-top:18px}

    .splash-progress{width:220px;height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid rgba(255,255,255,.06);margin-top:18px}
    .splash-progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,#74f9ff,#57a8ff);animation:bootload 2.3s ease forwards;box-shadow:0 0 18px rgba(116,249,255,.7)}
    @keyframes bootload{0%{width:0}35%{width:28%}68%{width:74%}100%{width:100%}}

    .footer-space{height:20px}
    .tag{display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);font-size:12px;color:#d4ebff;font-weight:700;margin-top:10px}
    .inline-kpi{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:12px}.inline-kpi .mini-card{padding:14px}.kpi-num{font-size:24px;font-weight:800;font-family:Orbitron,Inter,sans-serif}
    .holo{position:absolute;inset:auto 0 0;display:flex;justify-content:center;pointer-events:none;opacity:.42}
    .holo .beam{width:190px;height:190px;background:radial-gradient(circle, rgba(106,220,255,.34), transparent 60%);filter:blur(10px)}
    .empty-state{padding:18px;border-radius:20px;border:1px dashed rgba(255,255,255,.12);background:rgba(255,255,255,.025);color:var(--muted);font-size:14px;line-height:1.55;text-align:center}


    .system-transmission{position:absolute;inset:0;background:rgba(0,3,10,.72);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;z-index:30;padding:20px}
    .system-transmission.show{display:flex;animation:fadeIn .25s ease forwards}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .trans-card{width:100%;max-width:398px;border-radius:30px;border:1px solid rgba(112,213,255,.34);background:linear-gradient(180deg,rgba(5,20,38,.96),rgba(1,8,17,.98));box-shadow:0 0 0 1px rgba(120,220,255,.08),0 28px 90px rgba(0,0,0,.66),0 0 44px rgba(69,174,255,.2);padding:22px;position:relative;overflow:hidden}
    .trans-card::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(117,251,255,.06),transparent);transform:translateY(-100%);animation:sysSweep 2.6s linear infinite}
    @keyframes sysSweep{to{transform:translateY(100%)}}

    { key:'water', title:'Konsumsi air harian?', subtitle:'Hidrasi yang buruk akan langsung menurunkan performa dan pemulihan.', type:'range', min:1, max:5, step:0.1, unit:'liter / hari' }
  ];

  let state = load();

  function load(){
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? mergeDeep(structuredClone(defaultState), JSON.parse(raw)) : structuredClone(defaultState);
    } catch {
      return structuredClone(defaultState);
    }
  }
  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  function mergeDeep(target, source){
    for(const k in source){
      if(source[k] && typeof source[k] === 'object' && !Array.isArray(source[k])) target[k] = mergeDeep(target[k] || {}, source[k]);
      else target[k] = source[k];
    }
    return target;
  }
  function showToast(message){
    toast.textContent = message;
    toast.classList.add('show');

  }

      proof:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7a3 3 0 013-3h10a3 3 0 013 3v10a3 3 0 01-3 3H7a3 3 0 01-3-3V7z"/><path d="M8 12l2.5 2.5L16 9" stroke-linecap="round" stroke-linejoin="round"/></svg>',

      core:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2l2.2 4.5 4.8.7-3.5 3.4.8 4.9L12 13.3 7.7 15.5l.8-4.9L5 7.2l4.8-.7L12 2z" stroke-linejoin="round"/></svg>',

  function silhouetteIcon(){
    return `<svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6"><circle cx="12" cy="6" r="3"/><path d="M8 22l1-7-2-4 3-2h4l3 2-2 4 1 7M10 12l2 2 2-2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  function render(){
    if(!state.booted) return renderSplash();
    if(!state.systemAccepted) return renderAcceptance();
    if(!state.onboardingComplete) return renderQuestion();
    renderDashboard();
  }

    document.getElementById('saveExitBtn').onclick = () => {
      const activeInput = document.getElementById('fieldInput');
      if(activeInput && step.type === 'text') state.profile[step.key] = activeInput.value.trim();

      const btn = document.getElementById('nextBtn');

  function renderStepContent(step, content, profile){
    const val = profile[step.key];
    if(step.type === 'text'){
      content.innerHTML = `
        <div class="field">
          <label>Nama player</label>
          <textarea class="input safe-name-input" id="fieldInput" inputmode="text" autocomplete="off" autocapitalize="words" spellcheck="false" placeholder="contoh: Sevila">${escapeHtml(val || '')}</textarea>
        </div>
        <div class="safe-input-actions">
          <button class="btn secondary" type="button" id="safeNameBtn">Mode input aman</button>
          <button class="btn ghost" type="button" id="clearNameBtn">Hapus</button>
        </div>
        <div class="small-note" style="text-align:left">Kalau keyboard HP masih menutup, tekan Mode input aman. Nama ini dipakai di dashboard dan quest system.</div>`;
      const input = content.querySelector('#fieldInput');
      const saveName = () => { profile[step.key] = (input.value || '').trim(); try{ save(); }catch{} };
      input.addEventListener('input', e => { profile[step.key] = e.target.value; });
      input.addEventListener('change', saveName);
      input.addEventListener('blur', saveName);
      input.addEventListener('keydown', e => {
        if(e.key === 'Enter'){
          e.preventDefault();
          saveName();
          const btn = document.getElementById('nextBtn');
          if(btn) btn.click();
        }
      });
      content.querySelector('#safeNameBtn').onclick = () => {
        const result = window.prompt('Masukkan nama player:', profile[step.key] || input.value || '');
        if(result !== null){
          profile[step.key] = result.trim();
          save();
          renderQuestion();
        }
      };
      content.querySelector('#clearNameBtn').onclick = () => {
        profile[step.key] = '';
        save();
        renderQuestion();
      };
      return;
    }
    if(step.type === 'number'){
      content.innerHTML = `
        <div class="field">
          <label>Umur</label>
          <input type="number" min="${step.min}" max="${step.max}" class="input" id="fieldInput" value="${val}">
        </div>`;
      content.querySelector('#fieldInput').addEventListener('input', e => { profile[step.key] = clamp(Number(e.target.value || step.min), step.min, step.max); save(); });
      return;
    }
    if(step.type === 'range'){
      const display = step.key==='frequency' ? `${val}x seminggu` : `${val} ${step.unit}`;
      content.innerHTML = `
        <div class="field">
          <label>Nilai saat ini</label>
          <div class="value-pill" id="rangeValue">${display}</div>
        </div>
        <div class="slider-shell">
          <input type="range" id="rangeInput" min="${step.min}" max="${step.max}" ${step.step ? `step="${step.step}"` : ''} value="${val}">
        </div>`;
      const range = content.querySelector('#rangeInput');
      const pill = content.querySelector('#rangeValue');
      range.addEventListener('input', e => {
        const v = step.step ? Number(e.target.value) : parseInt(e.target.value,10);
        profile[step.key] = v;
        pill.textContent = step.key==='frequency' ? `${v}x seminggu` : `${v} ${step.unit}`;
        save();
      });
      return;
    }
    if(step.type === 'avatar'){
      const img = profile.avatarData || '';
      content.innerHTML = `
        <div class="photo-upload">
          <img class="photo-preview" id="avatarPreview" src="${img || 'icon.svg'}" alt="Preview profile">
          <input type="file" id="avatarInput" accept="image/*" class="hidden-file">
          <button class="btn secondary" type="button" id="chooseAvatar">Pilih Foto Player</button>
          <button class="btn ghost" type="button" id="clearAvatar">Pakai Logo Harimau</button>
          <div class="small-note">Saran: pakai foto wajah yang jelas. Nanti avatar ini muncul di dashboard bersama rank dan kekuatan.</div>
        </div>`;
      const input = content.querySelector('#avatarInput');
      const choose = content.querySelector('#chooseAvatar');
      const clear = content.querySelector('#clearAvatar');
      choose.onclick = (e) => { e.preventDefault(); input.click(); };
      clear.onclick = (e) => { e.preventDefault(); profile.avatarData=''; save(); renderQuestion(); };
      input.onchange = () => {
        const file = input.files && input.files[0];
        if(!file) return;
        showProcess('SCANNING IMAGE', ['Membaca file gambar...', 'Mengompresi avatar...', 'Menyimpan profil player...'], 900);
        const reader = new FileReader();
        reader.onload = () => {
          const imgEl = new Image();
          imgEl.onload = () => {
            const canvas = document.createElement('canvas');
            const max = 420;
            const scale = Math.min(max / imgEl.width, max / imgEl.height, 1);
            canvas.width = Math.max(1, Math.round(imgEl.width * scale));
            canvas.height = Math.max(1, Math.round(imgEl.height * scale));
            const ctx = canvas.getContext('2d');
            ctx.drawImage(imgEl, 0, 0, canvas.width, canvas.height);
            profile.avatarData = canvas.toDataURL('image/jpeg', 0.76);
            save();
            setTimeout(() => { hideProcess(); renderQuestion(); showToast('Foto player tersimpan.'); }, 650);
          };
          imgEl.onerror = () => { hideProcess(); showToast('Gambar gagal dibaca. Pilih file lain.'); };
          imgEl.src = reader.result;
        };
        reader.onerror = () => { hideProcess(); showToast('File gagal dibaca.'); };
        reader.readAsDataURL(file);
      };
      return;
    }

    if(step.type === 'ability'){
      const a = profile.ability || { pushup:10, squat:20, situp:15, plank:30, runKmTime:10 };
      profile.ability = a;
      content.innerHTML = `
        <div class="grid">
          ${abilityInput('pushup','Push-up max', 'Maksimal reps sekali jalan', a.pushup, 'reps')}
          ${abilityInput('squat','Squat max', 'Maksimal reps sekali jalan', a.squat, 'reps')}
          ${abilityInput('situp','Sit-up / crunch max', 'Maksimal reps sekali jalan', a.situp, 'reps')}
          ${abilityInput('plank','Plank max', 'Tahanan maksimal', a.plank, 'detik')}
          ${abilityInput('runKmTime','Waktu 1 km', 'Estimasi jalan/lari 1 km', a.runKmTime, 'menit')}
        </div>
        <div class="warning-ticker"><span class="warning-dot"></span><span>Jangan membesar-besarkan angka. Quest akan dibuat dari data ini. Bohong di awal = program tidak akurat.</span></div>`;
      content.querySelectorAll('[data-ability]').forEach(input => {
        input.addEventListener('input', e => {
          const k = e.target.dataset.ability;
          profile.ability[k] = Number(e.target.value || 0);
          save();
        });
      });
      return;
    }

    if(step.type === 'single' || step.type === 'multi'){
      const current = val;
      const selected = new Set(Array.isArray(current) ? current : [current]);
      const gridCls = step.options.length > 4 ? 'grid' : 'grid two';
      content.innerHTML = `<div class="${gridCls}" id="optionsWrap"></div>`;
      const wrap = content.querySelector('#optionsWrap');
      step.options.forEach(opt => {
        const isSelected = selected.has(opt.label);
        const el = document.createElement('button');
        el.type = 'button';
        el.className = 'option' + (isSelected ? ' selected' : '');
        el.innerHTML = `<span class="checkmark">${isSelected ? '✓' : ''}</span><span class="label">${opt.label}</span><span class="desc">${opt.desc}</span>`;
        el.onclick = () => {
          if(step.type === 'single'){
            profile[step.key] = opt.label;
          } else {
            let arr = Array.isArray(profile[step.key]) ? [...profile[step.key]] : [];
            const has = arr.includes(opt.label);
            if(opt.label === 'None'){
              arr = has ? [] : ['None'];
            } else {
              arr = arr.filter(x => x !== 'None');
              if(has) arr = arr.filter(x => x !== opt.label); else arr.push(opt.label);
            }
            if(arr.length === 0 && step.key === 'health') arr = ['None'];
            if(arr.length === 0 && step.key === 'equipment') arr = ['None (Bodyweight)'];
            if(arr.length === 0 && step.key === 'focus') arr = ['Full Body'];
            profile[step.key] = arr;
          }
          save();
          renderQuestion();
        };
        wrap.appendChild(el);
      });
      return;
    }
  }

  function validateStep(step){
    const activeInput = document.getElementById('fieldInput');
    if(activeInput && step.type === 'text') state.profile[step.key] = activeInput.value.trim();
    const value = state.profile[step.key];
    if(step.type === 'avatar') return true;
    if(step.type === 'text' && !String(value || '').trim()){
      showToast('Masukkan nama player terlebih dahulu.');
      return false;
    }
    if(step.type === 'multi' && (!Array.isArray(value) || value.length === 0)){
      showToast('Pilih minimal satu opsi.');
      return false;
    }
    if(step.type === 'ability'){
      const a = state.profile.ability || {};
      if(!a.pushup && !a.squat && !a.plank){
        showToast('Masukkan minimal push-up, squat, dan plank awal.');
        return false;
      }
    }
    return true;
  }

  function calculateProfileSystem(){
    const p = state.profile;
    const heightM = p.height / 100;
    const bmi = +(p.weight / (heightM*heightM)).toFixed(1);
    let bmiLabel = 'Healthy';
    if(bmi < 18.5) bmiLabel = 'Underweight';
    else if(bmi >= 25 && bmi < 30) bmiLabel = 'Overweight';
    else if(bmi >= 30) bmiLabel = 'Obese';

    const activityMap = { Sedentary: 0, 'Lightly Active': 8, 'Moderately Active': 16, 'Very Active': 24 };
    const conditionMap = { 'Slim / Underdeveloped': -3, 'Average': 5, 'Overweight': 0, 'Sedentary / Weak': -10, 'Already Training': 18 };
    const goalMap = { 'Build Muscle': {protein:2.2, factor:1.15}, 'Lose Weight': {protein:2.0, factor:0.9}, 'Look Better': {protein:1.9, factor:1.0}, 'Stay In Shape': {protein:1.8, factor:1.0} };
    const a = p.ability || { pushup:10, squat:20, situp:15, plank:30, runKmTime:10 };
    const abilityStrength = Math.round((Number(a.pushup||0)*1.1 + Number(a.squat||0)*.45 + Number(a.situp||0)*.45) / 2.1);
    const enduranceBase = Math.round(38 - Number(a.runKmTime||10)*2.2);
    const baseStrength = 12 + activityMap[p.activity] + conditionMap[p.condition] + Math.round((p.frequency-3)*3) + Math.round(abilityStrength*.55);
    const sleepBonus = Math.round((p.sleep-6)*4);
    const waterBonus = Math.round((p.water-2)*3);

    const currentStats = {
      strength: clamp(baseStrength + ('Build Muscle'===p.goal?4:0), 8, 78),
      vitality: clamp(14 + activityMap[p.activity] + sleepBonus + enduranceBase + (bmi > 28 ? -8 : 0), 8, 78),
      agility: clamp(13 + activityMap[p.activity] + enduranceBase + (p.condition==='Overweight' ? -8 : 0) + (p.health.includes('Cant Do Jumps') ? -5 : 0), 8, 78),
      recovery: clamp(12 + sleepBonus + waterBonus + Math.round(Number(a.plank||0)/8) + (p.health.includes('Back or Hernia') ? -3 : 0), 8, 78),
      discipline: clamp(15 + Math.round((p.frequency-2)*5) + (p.motivation==='Discipline' ? 8 : 2), 10, 80)
    };

    const commitment = Math.round((p.frequency*6) + (p.sleep*3) + (p.water*2) + (p.activity==='Very Active'?8:p.activity==='Moderately Active'?6:p.activity==='Lightly Active'?3:0));
    const potentialBase = clamp(55 + commitment/2 + (p.goal==='Build Muscle'?10: p.goal==='Look Better'?6:4), 62, 92);
    const potentialStats = {
      strength: clamp(potentialBase + 5 + (p.goal==='Build Muscle'?8:0), 68, 96),
      vitality: clamp(potentialBase + 2, 68, 95),
      agility: clamp(potentialBase - (p.condition==='Overweight'?2:0), 66, 93),
      recovery: clamp(potentialBase + (p.sleep>=7 ? 6 : 1), 68, 95),
      discipline: clamp(potentialBase + (p.motivation==='Discipline'?10:4), 72, 98)
    };

    const physiqueUse = clamp(Math.round((currentStats.strength+currentStats.vitality+currentStats.agility+currentStats.recovery+currentStats.discipline)/5), 18, 85);
    const wastedPotential = 100 - physiqueUse;
    const rank = physiqueUse >= 82 ? 'A' : physiqueUse >= 68 ? 'B' : physiqueUse >= 52 ? 'C' : physiqueUse >= 36 ? 'D' : 'E';
    const titleMap = {A:'Hunter',B:'Challenger',C:'Awakened',D:'Rookie',E:'Candidate'};
    const ageFactor = p.gender==='Male' ? 5 : -161;
    const bmr = 10*p.weight + 6.25*p.height - 5*p.age + ageFactor;
    const actMult = {Sedentary:1.2,'Lightly Active':1.37,'Moderately Active':1.55,'Very Active':1.72}[p.activity];
    let calories = Math.round(bmr*actMult*goalMap[p.goal].factor);
    if(p.goal==='Build Muscle') calories += 180;
    if(p.goal==='Lose Weight') calories -= 220;
    const protein = Math.round(p.targetWeight * goalMap[p.goal].protein);
    const fat = Math.round((calories*0.25)/9);
    const carbs = Math.round((calories - protein*4 - fat*9)/4);
    const waterGoal = +(Math.max(2.5, p.weight*0.04).toFixed(1));
    const workoutMinutes = clamp(32 + p.frequency*4 + (p.goal==='Build Muscle'?4:0), 35, 75);
    const estimated90DayWeight = p.goal==='Lose Weight' ? Math.max(p.targetWeight, p.weight - 6) : Math.min(p.targetWeight, p.weight + 5);
    const protocolName = `${p.goal === 'Build Muscle' ? 'Adaptive Muscle' : p.goal === 'Lose Weight' ? 'Lean Cut' : p.goal === 'Stay In Shape' ? 'Sustain' : 'Aesthetic'} Hunter Protocol`;

    state.system = {
      rank, title: titleMap[rank], currentStats, potentialStats, physiqueUse, wastedPotential,
      calorieGoal: calories, macros:{protein,carbs,fat}, waterGoal, workoutMinutes,
      restMinutes: p.goal==='Build Muscle' ? 1.5 : 1, weeklyWorkouts:p.frequency,
      bmi, bmiLabel, estimated90DayWeight, protocolName, reminders:true
    };
    state.quests = generateQuests();
    state.logs = [{ time: new Date().toLocaleString('id-ID'), type:'SYSTEM', text:`Protocol assigned: ${protocolName}` }];
  }

  function generateQuests(){
    const p = state.profile;
    const s = state.system;
    const bodyweight = p.equipment.includes('None (Bodyweight)') || p.equipment.includes('Pull-up Bar') || p.equipment.includes('Resistance Band');
    const a = p.ability || { pushup:10, squat:20, situp:15, plank:30, runKmTime:10 };
    const intensity = p.condition === 'Already Training' ? 1.45 : p.activity === 'Very Active' ? 1.35 : p.activity === 'Moderately Active' ? 1.22 : 1.08;
    const push = clamp(Math.round(Math.max(20, Number(a.pushup||10)*2.8*intensity)), 20, 140);
    const squat = clamp(Math.round(Math.max(35, Number(a.squat||20)*2.4*intensity)), 35, 180);
    const crunch = clamp(Math.round(Math.max(30, Number(a.situp||15)*2.5*intensity)), 30, 150);
    const plank = clamp(Math.round(Math.max(70, Number(a.plank||30)*2.1*intensity)), 70, 360);
    const walk = p.goal === 'Lose Weight' ? 9000 : p.goal === 'Build Muscle' ? 6500 : 7500;
    const pull = p.equipment.includes('Pull-up Bar') ? Math.max(4, Math.round(s.currentStats.strength/6)) : 0;
    const dumbbell = p.equipment.includes('Dumbbells') ? 'Dumbbell Row 3x12 / sisi' : null;

    const quests = [
      { id:makeId(), title:'Current Order: Push Discipline', desc:`Selesaikan ${push} push-up total hari ini. Pecah jadi beberapa set jika perlu.`, type:'Strength', value:`${push} reps`, proof:'Counter / manual', done:false },
      { id:makeId(), title:'Current Order: Lower Body Rise', desc:`Selesaikan ${squat} squat total dengan teknik bersih dan tempo stabil.`, type:'Vitality', value:`${squat} reps`, proof:'Counter / manual', done:false },
      { id:makeId(), title:'Current Order: Core Lock', desc:`Tahan plank selama ${plank} detik total.`, type:'Recovery', value:`${plank} sec`, proof:'Timer', done:false },
      { id:makeId(), title:'Current Order: Daily Motion', desc:`Capai minimal ${walk.toLocaleString('id-ID')} langkah atau 30 menit jalan cepat.`, type:'Agility', value:`${walk.toLocaleString('id-ID')} steps`, proof:'GPS / manual', done:false },
      { id:makeId(), title:'Current Order: Water Discipline', desc:`Minum ${s.waterGoal} liter air hari ini.`, type:'Support', value:`${s.waterGoal} L`, proof:'Manual check', done:false },
      { id:makeId(), title:'Current Order: Sleep Recovery', desc:`Kejar tidur minimal ${Math.max(7, p.sleep)} jam malam ini.`, type:'Recovery', value:`${Math.max(7, p.sleep)} hr`, proof:'Self report', done:false }
    ];
    if(crunch > 0) quests.splice(3,0,{ id:makeId(), title:'Current Order: Core Ignition', desc:`Selesaikan ${crunch} sit-up / crunch total untuk mengaktifkan core.`, type:'Core', value:`${crunch} reps`, proof:'Counter / manual', done:false });
    if(pull) quests.push({ id:makeId(), title:'Current Order: Pull Challenge', desc:`Selesaikan ${pull} pull-up total, boleh dibagi beberapa set.`, type:'Back', value:`${pull} reps`, proof:'Manual / video', done:false });
    if(dumbbell) quests.push({ id:makeId(), title:'Current Order: Equipment Bonus', desc:dumbbell, type:'Equipment', value:'3 sets', proof:'Manual', done:false });
    return quests;
  }

    document.querySelectorAll('.mark-done-btn').forEach(btn => btn.onclick = () => {

      q.done = true;
      state.logs.unshift({ time:new Date().toLocaleString('id-ID'), type:'QUEST', text:`Quest cleared: ${q.title}` });
      save(); showToast('Quest cleared. Rank progression stabilized.'); renderDashboard();
    });
    document.querySelectorAll('.log-proof-btn').forEach(btn => btn.onclick = () => {
      const q = state.quests.find(x=>x.id===btn.dataset.id); if(!q) return;
      state.logs.unshift({ time:new Date().toLocaleString('id-ID'), type:'PROOF', text:`Proof logged for ${q.title}` });
      save(); showToast('Proof tercatat di System log.');
    });
    const recalcBtn = document.getElementById('recalcBtn');
    if(recalcBtn) recalcBtn.onclick = () => { calculateProfileSystem(); save(); showToast('Protocol dikalibrasi ulang.'); renderDashboard(); };
    const reminderBtn = document.getElementById('reminderBtn');
    if(reminderBtn) reminderBtn.onclick = () => { state.system.reminders = !state.system.reminders; save(); showToast(`Reminder ${state.system.reminders ? 'diaktifkan' : 'dimatikan'}.`); renderDashboard(); };
    const enablePushBtn = document.getElementById('enablePushBtn');
    if(enablePushBtn) enablePushBtn.onclick = enablePushNotifications;
    const testPushBtn = document.getElementById('testPushBtn');
    if(testPushBtn) testPushBtn.onclick = testPush;
    const saveAiBtn = document.getElementById('saveAiBtn');
    if(saveAiBtn) saveAiBtn.onclick = () => {
      state.ai.model = document.getElementById('aiModelInput').value.trim() || 'gemini-2.5-flash';
      state.ai.enabled = true;
      save(); showSystemTransmission('AI CORE', 'Model disimpan. API key tetap aman di Vercel Environment Variable. Browser tidak melihat rahasia sistem.');
      renderDashboard();
    };
    const testAiBtn = document.getElementById('testAiBtn');
    if(testAiBtn) testAiBtn.onclick = () => runAiTransmission('judgement');
    const editAssessmentBtn = document.getElementById('editAssessmentBtn');
    if(editAssessmentBtn) editAssessmentBtn.onclick = () => { state.onboardingComplete=false; state.currentStep=0; save(); render(); };
    const resetBtn = document.getElementById('resetBtn');
    if(resetBtn) resetBtn.onclick = () => openConfirmReset();
  }




  function showProcess(title='PROCESSING', steps=['Analyzing...'], duration=1600){
    modalRoot.innerHTML = `
      <div class="process-screen" id="processScreen">
        <div class="process-card">
          <div class="process-title">${escapeHtml(title)}</div>
          <div class="process-num" id="processNum">0%</div>
          <div class="process-track"><div class="process-fill" id="processFill"></div></div>
          <div class="process-status" id="processStatus">${escapeHtml(steps[0] || 'Processing...')}</div>
        </div>
      </div>`;
    const fill = document.getElementById('processFill');
    const num = document.getElementById('processNum');
    const status = document.getElementById('processStatus');
    let start = performance.now();
    clearInterval(showProcess.timer);
    showProcess.timer = setInterval(() => {
      const elapsed = performance.now() - start;
      const pct = Math.min(96, Math.round((elapsed / duration) * 100));
      if(fill) fill.style.width = pct + '%';
      if(num) num.textContent = pct + '%';
      const idx = Math.min(steps.length - 1, Math.floor((pct / 100) * steps.length));
      if(status) status.textContent = steps[idx] || steps[0] || 'Processing...';
      if(pct >= 96) clearInterval(showProcess.timer);
    }, 80);
  }

  function hideProcess(){
    clearInterval(showProcess.timer);
    const fill = document.getElementById('processFill');
    const num = document.getElementById('processNum');
    if(fill) fill.style.width = '100%';
    if(num) num.textContent = '100%';
    setTimeout(() => { if(document.getElementById('processScreen')) modalRoot.innerHTML = ''; }, 180);
  }



  function cleanSystemMessage(raw){
    let text = String(raw || '')
      .replace(/```[a-zA-Z]*\n?/g, '')
      .replace(/```/g, '')
      .replace(/\*\*/g, '')
      .replace(/`/g, '')
      .replace(/\[SYSTEM TRANSMISSION\]/gi, '')
      .replace(/SYSTEM TRANSMISSION/gi, '')
      .replace(/^\s*PLAYER\s*:\s*$/gim, '')
      .trim();

    const bad =
      !text ||
      text.length < 24 ||
      /^PLAYER\s*:?\s*$/i.test(text) ||
      /^JUDGEMENT\s*:?\s*$/i.test(text) ||
      /^ORDER\s*\d?\s*:?\s*$/i.test(text) ||
      text.split(/\s+/).length < 5;

    if(bad){
      const p = state?.profile || {};
      const done = (state?.quests || []).filter(q=>q.done).length;
      const total = (state?.quests || []).length || 1;
      const percent = Math.round(done / total * 100);
      return `PLAYER: ${p.name || 'Unknown'}\nJUDGEMENT: Data AI tidak lengkap. SYSTEM memakai rule engine.\nORDER 1: Buka Current Order.\nORDER 2: Selesaikan minimal satu quest sekarang.\nORDER 3: Progress saat ini ${percent}%.`;
    }

    const lines = text.split(/\n+/).map(x => x.trim()).filter(Boolean);
    text = lines.slice(0, 7).join('\n');
    if(text.length > 520) text = text.slice(0, 520).replace(/\s+\S*$/, '') + '...';
    return text;
  }

  function showHologramTransmission(title, message, options={}){
    const rank = state?.system?.rank || 'E';
    const closable = options.closable !== false;
    const primary = options.primary || 'ACCEPT ORDER';
    const secondary = options.secondary || null;
    const autoClose = options.autoClose || 0;
    modalRoot.innerHTML = `
      <div class="holo-system show" id="holoSystem">
        <div class="holo-card">
          <div class="holo-header">
            <div class="holo-title"><span class="holo-orb"></span><span>${escapeHtml(title)}</span></div>
            <div class="holo-rank">RANK ${escapeHtml(rank)}</div>
          </div>
          <div class="holo-body"><span id="holoText"></span><span class="holo-cursor"></span></div>
          <div class="holo-footer">
            <button class="btn" id="holoAccept">${escapeHtml(primary)}</button>
            ${secondary ? `<button class="btn secondary" id="holoSecondary">${escapeHtml(secondary)}</button>` : ''}
          </div>
          <div class="holo-mini" style="margin-top:10px">SYSTEM message generated from player data and current protocol.</div>
        </div>
      </div>`;
    const target = document.getElementById('holoText');
    const text = cleanSystemMessage(String(message || ''));
    let i = 0;
    clearInterval(showHologramTransmission.typer);
    showHologramTransmission.typer = setInterval(() => {
      target.textContent = text.slice(0, i++);
      if(i > text.length) clearInterval(showHologramTransmission.typer);
    }, options.speed || 9);
    const accept = document.getElementById('holoAccept');
    accept.onclick = () => {
      if(closable) modalRoot.innerHTML = '';
      if(options.onAccept) options.onAccept();
    };
    const sec = document.getElementById('holoSecondary');
    if(sec) sec.onclick = () => {
      modalRoot.innerHTML = '';
      if(options.onSecondary) options.onSecondary();
    };
    if(autoClose){
      setTimeout(()=>{ if(document.getElementById('holoSystem')) modalRoot.innerHTML=''; }, autoClose);
    }
  }

  function showSystemPing(){
    const ping = document.getElementById('systemPing');
    if(!ping) return;
    ping.classList.add('show');
    clearTimeout(showSystemPing.t);
    showSystemPing.t = setTimeout(()=>ping.classList.remove('show'), 2400);
  }

  function localSystemMessage(reason='auto'){
    const p = state.profile || {};
    const s = state.system || {};
    const done = (state.quests || []).filter(q=>q.done).length;
    const total = (state.quests || []).length || 1;
    const percent = Math.round(done / total * 100);
    const name = p.name || 'Player';
    if(reason === 'onboardingComplete'){
      return `PLAYER ${name.toUpperCase()} TERDAFTAR.\n\nKondisi awal telah dibaca. SYSTEM menetapkan ${s.protocolName || 'Hunter Protocol'}.\n\nMulai sekarang, progres tidak dihitung dari niat. Progres hanya sah jika Current Order selesai.`;
    }
    if(reason === 'returnLow' || percent < 35){
      return `PLAYER ${name.toUpperCase()}, STATUS HARI INI RENDAH.\n\nCurrent Order baru ${percent}% selesai. Alasan tidak meningkatkan rank. Selesaikan minimal satu order sekarang.`;
    }
    if(percent < 70){
      return `PLAYER ${name.toUpperCase()}, PROGRES BELUM SAH.\n\n${percent}% selesai. SYSTEM tidak menaikkan rank dari usaha setengah jalan. Buka ORDER dan lanjutkan.`;
    }
    return `PLAYER ${name.toUpperCase()}, PROGRES TERDETEKSI.\n\n${percent}% order selesai. Jangan berhenti sebelum clear condition terpenuhi sepenuhnya.`;
  }

  async function autoSystemTransmission(reason='auto'){
    if(!state.onboardingComplete) return;
    const today = new Date().toISOString().slice(0,10);
    const key = reason + ':' + today;
    if(reason === 'return' && state.systemEvents?.lastAuto === key) return;
    state.systemEvents = state.systemEvents || { lastAuto:'', count:0, bootTransmissionShown:false };
    state.systemEvents.lastAuto = key;
    state.systemEvents.count = (state.systemEvents.count || 0) + 1;
    save();
    showSystemPing();

    if(state.ai?.enabled){
      try{
        const prompt = buildAiPrompt(`auto hologram transmission: ${reason}. Buat pesan pendek maksimal 5 baris. Jangan markdown. Jangan simbol **. Seperti notifikasi SYSTEM yang memerintah.`);
        const res = await fetch('/api/gemini', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ prompt, mode:'auto', model: state.ai.model || 'gemini-2.5-flash' })
        });
        const data = await res.json();
        if(res.ok && data.text && data.text.trim().length >= 24 && !/^\s*PLAYER\s*:?\s*$/i.test(data.text.trim())){
          showHologramTransmission('SYSTEM TRANSMISSION', data.text, {primary:'UNDERSTOOD'});
          return;
        }
      }catch(e){}
    }
    showHologramTransmission('SYSTEM TRANSMISSION', localSystemMessage(reason), {primary:'ACCEPT ORDER'});
  }


  function showSystemTransmission(title, message, closable=true){
    showHologramTransmission(title, message, { primary: closable ? 'ACCEPT' : 'PROCESSING', closable });
  }

  async function runAiTransmission(mode='judgement'){
    showSystemTransmission('AI CORE', 'Menghubungkan ke Vercel AI Core. Menilai kondisi player dan protokol aktif...', false);
    try{
      const prompt = buildAiPrompt(mode);
      const res = await fetch('/api/gemini', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ prompt, mode, model: state.ai.model || 'gemini-2.5-flash' })
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data?.error || 'AI request failed');
      let text = data.text || '';
      if(!text || text.trim().length < 24 || /^\s*PLAYER\s*:?\s*$/i.test(text.trim())){
        text = localSystemMessage(mode || 'AI fallback');
      }
      state.ai.lastMessage = text;
      state.logs.unshift({time:new Date().toLocaleString('id-ID'), type:'AI', text: text.slice(0,120)});
      save();
      showSystemTransmission('SYSTEM TRANSMISSION', text);
    }catch(err){
      showSystemTransmission('AI ERROR', 'AI Core gagal menjawab: ' + err.message + '. Pastikan GEMINI_API_KEY sudah dipasang di Vercel Settings → Environment Variables.');
    }
  }

  function buildAiPrompt(mode){
    const p = state.profile, s = state.system;
    return `Kamu adalah SYSTEM fitness otoriter. Jawab harus SELESAI, pendek, dan tidak boleh berhenti di label kosong.

ATURAN OUTPUT:
- Bahasa Indonesia.
- Maksimal 6 baris.
- Jangan markdown, jangan **, jangan backtick.
- Setiap label wajib ada isinya.
- Jangan menulis hanya "PLAYER:".
- Gunakan format persis:
PLAYER: ${p.name || 'Unknown'}
JUDGEMENT: satu kalimat tegas
ORDER 1: perintah spesifik
ORDER 2: perintah spesifik
ORDER 3: perintah spesifik

MODE: ${mode}
DATA PLAYER:
Nama: ${p.name || 'Unknown'}
Umur: ${p.age || '-'}
Tinggi/Berat: ${p.height || '-'}cm/${p.weight || '-'}kg
Target: ${p.goal || '-'}, target weight ${p.targetWeight || '-'}kg
Kondisi: ${p.condition || '-'}
Activity: ${p.activity || '-'}, frequency ${p.frequency || '-'}x/minggu
Health issues: ${(p.health || []).join(', ') || 'None'}
Equipment: ${(p.equipment || []).join(', ') || 'None'}
Focus: ${(p.focus || []).join(', ') || 'Full Body'}
Kemampuan awal: pushup ${p.ability?.pushup || 0}, squat ${p.ability?.squat || 0}, situp ${p.ability?.situp || 0}, plank ${p.ability?.plank || 0}s, 1km ${p.ability?.runKmTime || 0} menit
Stats: ${JSON.stringify(s.currentStats || {})}
Quest: ${(state.quests || []).map(q=>`${q.title}: ${q.value} done=${q.done}`).join('; ') || 'Belum ada quest'}

Tulis perintah final sekarang.`;
  }

  function triggerSystemModal(){
    modalRoot.innerHTML = `
      <div class="modal show">
        <div class="modal-card">
          <h3>SYSTEM message</h3>
          <p>Player ${escapeHtml(state.profile.name || 'Unknown')}, Current Order belum selesai berarti progresmu belum sah. Pilih tindakan.</p>
          <div class="cta-stack">
            <button class="btn" id="jumpOrderBtn">Buka Daily Order</button>
            <button class="btn secondary" id="quickMessageBtn">System Judgement</button>
            <button class="btn secondary" id="aiCommandBtn">AI Command</button>
            <button class="btn ghost" id="closeModalBtn">Tutup</button>
          </div>
        </div>
      </div>`;
    document.getElementById('closeModalBtn').onclick = () => modalRoot.innerHTML = '';
    document.getElementById('jumpOrderBtn').onclick = () => { state.activeTab='orders'; save(); modalRoot.innerHTML=''; renderDashboard(); };
    document.getElementById('quickMessageBtn').onclick = () => { modalRoot.innerHTML=''; showHologramTransmission('SYSTEM JUDGEMENT', systemJudgement(), {primary:'ACCEPT'}) };
    document.getElementById('aiCommandBtn').onclick = () => { modalRoot.innerHTML=''; runAiTransmission('daily command'); };
  }

  function openConfirmReset(){
    modalRoot.innerHTML = `
      <div class="modal show">
        <div class="modal-card">
          <h3>Reset SYSTEM?</h3>
          <p>Semua data assessment, quest, dan log akan dihapus dari perangkat ini. Tindakan ini tidak bisa dibatalkan.</p>
          <div class="cta-stack">
            <button class="btn secondary" id="cancelReset">Batal</button>
            <button class="btn" id="confirmReset">Hapus semuanya</button>
          </div>
        </div>
      </div>`;
    document.getElementById('cancelReset').onclick = () => modalRoot.innerHTML = '';
    document.getElementById('confirmReset').onclick = () => {
      localStorage.removeItem(STORAGE_KEY);
      state = structuredClone(defaultState);
      modalRoot.innerHTML = '';
      showToast('SYSTEM reset selesai.');
      render();
    };
  }

  function systemJudgement(){
    const done = state.quests.filter(q=>q.done).length;
    const total = state.quests.length || 1;
    const ratio = done/total;
    if(ratio >= .8) return 'System Judgement: Kinerja hari ini kuat. Disiplinmu mulai stabil. Terus naikkan level.';
    if(ratio >= .4) return 'System Judgement: Progres ada, tapi masih jauh dari maksimal. Jangan puas terlalu cepat.';
    return 'System Judgement: Kamu masih bermain-main dengan potensimu sendiri. Clear order sebelum hari berakhir.';
  }

  function animateBars(){
    requestAnimationFrame(() => {
      document.querySelectorAll('[data-width]').forEach(el => el.style.width = el.dataset.width);
    });
  }

  function metric(title, value, max){
    return `<div class="metric-card"><div class="metric-top"><h4>${title}</h4><b>${value}</b></div><div class="bar"><span data-width="${Math.min(100, Math.round(value/max*100))}%"></span></div></div>`;
  }
  function macroCard(title, value, unit){
    return `<div class="metric-card"><div class="metric-top"><h4>${title}</h4><b>${value}${unit}</b></div><div class="bar red"><span data-width="${Math.min(100, Math.round((value / (title==='Water'?5:300))*100))}%"></span></div></div>`;
  }
  function compareMetric(title, current, potential){
    return `<div class="metric-card"><div class="metric-top"><h4>${title}</h4><b>${current} → ${potential}</b></div><div class="bar red"><span data-width="${current}%"></span></div><div class="bar" style="margin-top:10px"><span data-width="${potential}%"></span></div><div class="tiny" style="margin-top:10px">Current vs Potential</div></div>`;
  }
  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
  function makeId(){ return Math.random().toString(36).slice(2,9); }
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m])); }



  async function enablePushNotifications(){
    try{
      if(!('Notification' in window)) throw new Error('Browser tidak mendukung Notification API.');
      if(!('serviceWorker' in navigator)) throw new Error('Browser tidak mendukung Service Worker.');
      const permission = await Notification.requestPermission();
      state.push.lastPermission = permission;
      save();
      if(permission !== 'granted'){
        showHologramTransmission('PUSH DENIED', 'Izin push ditolak. SYSTEM tidak dapat memanggilmu saat aplikasi tertutup.', {primary:'UNDERSTOOD'});
        renderDashboard();
        return;
      }

      const cfgRes = await fetch('/api/firebase-config');
      const cfg = await cfgRes.json();
      if(!cfg.firebaseConfig || !cfg.vapidKey) throw new Error(cfg.error || 'Firebase config/VAPID key belum lengkap di Vercel env.');

      const appMod = await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js');
      const msgMod = await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-messaging.js');
      const app = appMod.initializeApp(cfg.firebaseConfig);
      const messaging = msgMod.getMessaging(app);
      const existingRegs = await navigator.serviceWorker.getRegistrations();
      for(const reg of existingRegs){
        if(reg.active && reg.active.scriptURL && reg.active.scriptURL.includes('firebase-messaging-sw.js')){
          await reg.unregister().catch(()=>{});
        }
      }
      const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js?v=20', { scope: '/' });
      await registration.update().catch(()=>{});
      const token = await msgMod.getToken(messaging, { vapidKey: cfg.vapidKey, serviceWorkerRegistration: registration });

      state.push.enabled = true;
      state.push.token = token;
      state.push.vapidKey = cfg.vapidKey;
      save();

      await fetch('/api/register-token', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          token,
          player: { name: state.profile.name, rank: state.system.rank, goal: state.profile.goal }
        })
      }).catch(()=>{});

      msgMod.onMessage(messaging, payload => {
        const title = payload?.notification?.title || 'SYSTEM PUSH';
        const body = payload?.notification?.body || payload?.data?.body || 'Current Order menunggu.';
        showHologramTransmission(title, body, {primary:'ACCEPT ORDER'});
      });

      showHologramTransmission('PUSH LINKED', 'Firebase Cloud Messaging aktif. SYSTEM sekarang dapat mengirim panggilan dari server ketika app mendukung background push.', {primary:'ACCEPT'});
      renderDashboard();
    }catch(err){
      showHologramTransmission('PUSH ERROR', err.message + '\n\nJika masih error, hapus Site Data domain ini lalu buka ulang. Pastikan v20 sudah terdeploy dan /firebase-messaging-sw.js menampilkan kode JavaScript.', {primary:'UNDERSTOOD'});
    }
  }

  async function testPush(){
    try{
      if(!state.push?.token){
        showHologramTransmission('NO TOKEN', 'Aktifkan push terlebih dahulu. Tanpa token, server tidak tahu ke perangkat mana perintah dikirim.', {primary:'ENABLE PUSH', onAccept: enablePushNotifications});
        return;
      }
      const res = await fetch('/api/send-system-push', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          token: state.push.token,
          title: 'SYSTEM ORDER',
          body: `Player ${state.profile.name || 'Unknown'}, kembali ke Current Order. Progress yang tidak dicatat tidak diakui.`
        })
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || 'Push test failed');
      showHologramTransmission('PUSH SENT', 'Perintah push dikirim. Kalau app sedang foreground, hologram akan tampil. Kalau background, sistem Android/browser akan menampilkan notifikasi.', {primary:'ACCEPT'});
    }catch(err){
      showHologramTransmission('PUSH SEND ERROR', err.message + '\n\nUntuk Test Push server: pastikan FIREBASE_SERVICE_ACCOUNT_JSON valid, sudah redeploy, dan Enable Push sudah menghasilkan token.', {primary:'UNDERSTOOD'});
    }
  }


  let deferredInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    setTimeout(() => {
      const banner = document.getElementById('installBanner');
      if(banner) banner.style.display = 'flex';
    }, 350);
  });
  document.addEventListener('click', async (e) => {
    if(e.target && e.target.id === 'installBtn' && deferredInstallPrompt){
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      const banner = document.getElementById('installBanner');
      if(banner) banner.style.display = 'none';
    }
  });
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
  }


  function startSystemPulse(){
    clearInterval(startSystemPulse.interval);
    startSystemPulse.interval = setInterval(() => {
      if(!state.onboardingComplete) return;
      if(document.getElementById('holoSystem')) return;
      const now = Date.now();
      state.systemEvents = state.systemEvents || {};
      if(now - (state.systemEvents.lastPulseAt || 0) < 90000) return;
      state.systemEvents.lastPulseAt = now;
      save();
      autoSystemTransmission('periodic command');
    }, 30000);
  }

  render();
})();
